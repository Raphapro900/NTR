        /* ===== ESTILOS COMPLETOS ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Komika Axis', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            margin: 0;
            padding: 20px;
            transition: transform 0.05s, filter 0.05s;
            overflow-x: hidden;
        }
        body.shaking {
            animation: shakeWithBlur 0.5s ease-in-out;
        }
        @keyframes shakeWithBlur {
            0%, 100% { transform: translate(0,0) rotate(0deg); filter: blur(0px); }
            10% { transform: translate(-12px,8px) rotate(-2deg); filter: blur(3px); }
            20% { transform: translate(12px,-8px) rotate(2deg); filter: blur(4px); }
            30% { transform: translate(-8px,12px) rotate(-1.5deg); filter: blur(3px); }
            40% { transform: translate(8px,-12px) rotate(1.5deg); filter: blur(4px); }
            50% { transform: translate(-12px,6px) rotate(-2deg); filter: blur(5px); }
            60% { transform: translate(12px,-6px) rotate(2deg); filter: blur(4px); }
            70% { transform: translate(-6px,10px) rotate(-1deg); filter: blur(3px); }
            80% { transform: translate(6px,-10px) rotate(1deg); filter: blur(3px); }
            90% { transform: translate(-8px,4px) rotate(-0.5deg); filter: blur(2px); }
            100% { transform: translate(0,0) rotate(0deg); filter: blur(0px); }
        }

        .chat-messages .msg {
            color: #ffb3b3cc;
            font-size: 0.9rem;
            padding: 0.2rem 0.5rem;
            border-radius: 0.5rem;
            background: rgba(255,255,255,0.03);
            word-break: break-word;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .chat-messages .msg .sender {
            color: #ff6b7c;
            font-weight: bold;
        }
        .chat-input-row {
            display: flex;
            gap: 0.5rem;
        }
        .chat-input-row input {
            flex: 1;
            padding: 0.5rem 1rem;
            border-radius: 60px;
            border: 2px solid #ff6b7c33;
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.9rem;
            font-family: 'Segoe UI', Arial, sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }
        .chat-input-row input:focus {
            border-color: #ff3b5c;
            background: rgba(255,255,255,0.10);
        }
        .chat-input-row button {
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            border: none;
            background: linear-gradient(135deg, #ff3b5c, #dd0028);
            color: #1a1a2e;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;

        .chat-input-row button:active {

            box-shadow: 0 0px 0 #881a2a;

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 10px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #ff3b5c66; border-radius: 10px; }

        @media (max-width: 600px) {
            .logo-text { font-size: 3.5rem; letter-spacing: 4px; }
            .logo-sub { font-size: 0.8rem; letter-spacing: 6px; }
            .heart { font-size: 3.8rem; }
            .hearts-container { gap: 1rem; }
            .heart-counter { padding: 1.2rem 1.5rem 1rem; }
            .reset-btn { font-size: 1.1rem; padding: 0.5rem 1.4rem; }
            .youtube-search { padding: 0.8rem 1rem; }
            .youtube-search input { min-width: 120px; font-size: 0.85rem; padding: 0.6rem 1rem; }
            .youtube-search button { font-size: 0.8rem; padding: 0.6rem 1.2rem; }
            .game-over-overlay .go-text { font-size: 3.5rem; letter-spacing: 6px; }
            .game-over-overlay .go-sub { font-size: 1.2rem; }
            .game-over-overlay .go-reset-btn { font-size: 1.3rem; padding: 0.6rem 1.8rem; }
            .multiplayer-buttons button { font-size: 0.9rem; padding: 0.6rem 1.2rem; min-width: 100px; }
            .modal { padding: 1.8rem 1.5rem; }
            .modal h2 { font-size: 1.6rem; }
            .modal .code-display { font-size: 2.2rem; }
            .rival-hearts { top: 10px; right: 10px; padding: 0.5rem 1rem; min-width: 70px; }
            .rival-hearts .rival-heart { font-size: 1.5rem; }
            .rival-hearts .rival-container { gap: 0.3rem; }
            .credits { font-size: 0.7rem; }
            .chat-container { max-height: 160px; }
        }
        @media (max-width: 400px) {
            .heart { font-size: 3rem; }
            .hearts-container { gap: 0.6rem; }
            .logo-text { font-size: 2.8rem; letter-spacing: 2px; }
            .game-over-overlay .go-text { font-size: 2.8rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

<!-- GAME OVER OVERLAY -->
<div class="game-over-overlay" id="gameOverOverlay">
    <div class="go-text">GAME OVER</div>
    <div class="go-sub" id="goSubText">❤️ Haz perdido todos tus corazones</div>
    <button class="go-reset-btn" id="goResetBtn">⟳ Volver a intentar</button>
</div>

<!-- MODAL MULTIJUGADOR -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 id="modalTitle">🎮 Multijugador</h2>
        <p id="modalDesc">Ingresa el código de la sala o crea una nueva</p>
        <div id="codeDisplay" class="code-display" style="display:none;"></div>
        <input type="text" id="modalInput" placeholder="Código de 5 dígitos" maxlength="5" style="display:none;">
        <div class="modal-buttons" id="modalButtons">
            <button class="secondary" id="modalJoinBtn">🔑 Unirse</button>
            <button class="green" id="modalCreateBtn">✨ Crear Sala</button>
            <button class="danger" id="modalCancelBtn">✕ Cancelar</button>
        </div>
        <div class="modal-buttons" id="modalAdminButtons" style="display:none;">
            <button class="danger" id="modalKickBtn">👢 Expulsar Jugador</button>
            <button class="secondary" id="modalCloseBtn">✕ Cerrar Sala</button>
        </div>
    </div>
</div>

<!-- CORAZONES DEL RIVAL -->
<div class="rival-hearts" id="rivalHearts">
    <div class="rival-label" id="rivalLabel">👤 RIVAL</div>
    <div class="rival-container" id="rivalContainer">
        <span class="rival-heart">❤️</span>
        <span class="rival-heart">❤️</span>
        <span class="rival-heart">❤️</span>
    </div>
</div>

<div class="main-container" id="mainContainer">
    <div class="logo-container">
        <div class="logo-text">NoTeRias</div>
        <div class="logo-sub">★ play & enjoy ★</div>
    </div>

    <div class="multiplayer-buttons" id="multiplayerButtons">
        <button id="multiplayerBtn">🎮 Multijugador</button>
        <button id="exitRoomBtn" class="danger" style="display:none;">🚪 Salir Sala</button>
    </div>

    <div class="heart-counter" id="heartCounter">
        <div class="player-label" id="playerLabel">👤 TÚ</div>
        <div class="hearts-container" id="heartsContainer">
            <span class="heart" data-index="0">❤️</span>
            <span class="heart" data-index="1">❤️</span>
            <span class="heart" data-index="2">❤️</span>
        </div>
        <button id="resetBtn" class="reset-btn">⟳ Volver a intentar</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Escribe un mensaje..." maxlength="100">
            <button id="chatSendBtn">📨 Enviar</button>
        </div>
    </div>

    <div class="youtube-search" id="youtubeSearch">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Pega la URL de YouTube..." value="">
        <button id="searchBtn"><span class="btn-icon">▶</span> Cargar</button>
    </div>
    <div class="youtube-results" id="youtubeResults">
        <button class="close-btn" id="closeResults">✕</button>
        <div id="videoContainer"></div>
    </div>

    <div class="credits">
        <span>CCO</span> Raphapro900 <span>- V1.0</span>
    </div>
</div>

<!-- AUDIOS -->
<audio id="gameOverAudio" preload="auto"><source src="GameOver.mp3" type="audio/mpeg"></audio>
<audio id="ayNoAudio" preload="auto"><source src="AyNo.mp3" type="audio/mpeg"></audio>
<audio id="ayAudio" preload="auto"><source src="Ay.mp3" type="audio/mpeg"></audio>
<audio id="nooAudio" preload="auto"><source src="Noo.mp3" type="audio/mpeg"></audio>
<audio id="wthbAudio" preload="auto"><source src="WTHB.mp3" type="audio/mpeg"></audio>
<audio id="vineBoomAudio" preload="auto"><source src="VineBoom.mp3" type="audio/mpeg"></audio>
<audio id="oofAudio" preload="auto"><source src="oof.mp3" type="audio/mpeg"></audio>

<script>
    (function() {
        // === ESTADO ===
        let hearts = [true, true, true];
        let isGameOver = false;
        let isMusicPlaying = false;
        let isMultiplayer = false;
        let roomCode = '';
        let isAdmin = false;
        let playerName = 'TÚ';
        let playerEmoji = '👤';
        let rivalHearts = [true, true, true];
        let rivalName = 'RIVAL';
        let rivalEmoji = '👤';
        let rivalConnected = false;
        let activeRooms = {}; // Simulación de salas activas

        // === DOM ===
        const heartElements = document.querySelectorAll('.heart');
        const resetBtn = document.getElementById('resetBtn');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const youtubeResults = document.getElementById('youtubeResults');
        const videoContainer = document.getElementById('videoContainer');
        const closeResultsBtn = document.getElementById('closeResults');
        const youtubeSearch = document.getElementById('youtubeSearch');
        const mainContainer = document.getElementById('mainContainer');
        const audioElement = document.getElementById('gameOverAudio');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const goResetBtn = document.getElementById('goResetBtn');
        const goSubText = document.getElementById('goSubText');

        const multiplayerBtn = document.getElementById('multiplayerBtn');
        const exitRoomBtn = document.getElementById('exitRoomBtn');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const modalInput = document.getElementById('modalInput');
        const codeDisplay = document.getElementById('codeDisplay');
        const modalButtons = document.getElementById('modalButtons');
        const modalAdminButtons = document.getElementById('modalAdminButtons');
        const modalJoinBtn = document.getElementById('modalJoinBtn');
        const modalCreateBtn = document.getElementById('modalCreateBtn');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalKickBtn = document.getElementById('modalKickBtn');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        const chatContainer = document.getElementById('chatContainer');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');

        const rivalHeartsEl = document.getElementById('rivalHearts');
        const rivalContainer = document.getElementById('rivalContainer');
        const rivalLabel = document.getElementById('rivalLabel');
        const playerLabel = document.getElementById('playerLabel');

        // === AUDIOS ===
        const ayNoAudio = document.getElementById('ayNoAudio');
        const ayAudio = document.getElementById('ayAudio');
        const nooAudio = document.getElementById('nooAudio');
        const wthbAudio = document.getElementById('wthbAudio');
        const vineBoomAudio = document.getElementById('vineBoomAudio');
        const oofAudio = document.getElementById('oofAudio');

        // === FUNCIONES DE AUDIO ===
        function playRandomExclamation() {
            const audios = [ayNoAudio, ayAudio, nooAudio, wthbAudio];
            const audio = audios[Math.floor(Math.random() * audios.length)];
            try {
                audio.currentTime = 0;
                audio.volume = 0.8;
                audio.play().catch(() => {});
            } catch(e) {}
        }

        function playVineBoom() {
            try {
                vineBoomAudio.currentTime = 0;
                vineBoomAudio.volume = 1.0;
                vineBoomAudio.play().catch(() => {});
            } catch(e) {}
        }

        function playOof() {
            try {
                oofAudio.currentTime = 0;
                oofAudio.volume = 0.8;
                oofAudio.play().catch(() => {});
            } catch(e) {}
        }

        function playGameOverMusic() {
            try {
                if (isMusicPlaying) return;
                audioElement.currentTime = 0;
                audioElement.volume = 1.0;
                const playPromise = audioElement.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => { isMusicPlaying = true; }).catch(() => {});
                }
            } catch(e) {}
        }

        function stopGameOverMusic() {
            try {
                if (!audioElement.paused) {
                    audioElement.pause();
                    audioElement.currentTime = 0;
                }
                isMusicPlaying = false;
            } catch(e) {}
        }

        function shakeScreen() {
            document.body.classList.remove('shaking');
            void document.body.offsetWidth;
            document.body.classList.add('shaking');
            setTimeout(() => { document.body.classList.remove('shaking'); }, 500);
        }

        // === UI ===
        function updateHeartsUI() {
            heartElements.forEach((el, index) => {
                if (hearts[index]) {
                    el.classList.remove('lost', 'breaking');
                    el.textContent = '❤️';
                } else {
                    el.classList.add('lost');
                    el.textContent = '💔';
                }
            });
        }

        function updateRivalUI() {
            const heartsEl = rivalContainer.querySelectorAll('.rival-heart');
            rivalHearts.forEach((alive, index) => {
                if (heartsEl[index]) {
                    if (alive) {
                        heartsEl[index].classList.remove('lost');
                        heartsEl[index].textContent = '❤️';
                    } else {
                        heartsEl[index].classList.add('lost');
                        heartsEl[index].textContent = '💔';
                    }
                }
            });
        }

        // === JUEGO ===
        function checkLoseCondition() {
            const allLost = hearts.every(h => h === false);
            if (allLost && !isGameOver) {
                isGameOver = true;
                resetBtn.classList.add('visible');
                heartElements.forEach(el => {
                    if (el.classList.contains('lost')) {
                        el.classList.remove('lost');
                        el.classList.add('breaking');
                        el.textContent = '❤️';
                    }
                });
                shakeScreen();
                playVineBoom();
                setTimeout(() => { playGameOverMusic(); }, 300);
                setTimeout(() => {
                    showGameOverOverlay('💀 ¡Has perdido todos tus corazones!');
                }, 600);
            }
        }

        function showGameOverOverlay(subText) {
            if (subText) goSubText.textContent = subText;
            gameOverOverlay.classList.add('show');
            document.body.classList.add('game-over-active');
            youtubeSearch.classList.add('hidden');
            youtubeResults.classList.remove('active');
            youtubeResults.classList.add('hidden');
            videoContainer.innerHTML = '';
            mainContainer.classList.add('game-over-mode');
        }

        function hideGameOverOverlay() {
            gameOverOverlay.classList.remove('show');
            document.body.classList.remove('game-over-active');
            mainContainer.classList.remove('game-over-mode');
            youtubeSearch.classList.remove('hidden');
            youtubeResults.classList.remove('hidden');
            stopGameOverMusic();
            isMusicPlaying = false;
        }

        function resetHearts() {
            stopGameOverMusic();
            isMusicPlaying = false;
            isGameOver = false;
            hearts = [true, true, true];
            updateHeartsUI();
            resetBtn.classList.remove('visible');
            document.body.classList.remove('shaking');
            hideGameOverOverlay();
            youtubeSearch.classList.remove('hidden');
            youtubeResults.classList.remove('hidden');
            mainContainer.classList.remove('game-over-mode');
        }

        // === CLICK EN CORAZÓN ===
        function handleHeartClick(e) {
            if (isGameOver) return;
            const heartEl = e.currentTarget;
            const index = parseInt(heartEl.dataset.index, 10);
            if (!hearts[index]) return;

            hearts[index] = false;
            updateHeartsUI();
            shakeScreen();

            const remaining = hearts.filter(h => h === true).length;
            if (remaining === 1) {
                playRandomExclamation();
                setTimeout(() => { playVineBoom(); }, 200);
            } else if (remaining === 0) {
                playVineBoom();
            }

            heartEl.style.transform = 'scale(0.7) rotate(-8deg)';
            setTimeout(() => { heartEl.style.transform = ''; }, 150);
            checkLoseCondition();

            // SIMULACIÓN MULTIJUGADOR: el rival también pierde un corazón
            if (isMultiplayer && rivalConnected) {
                setTimeout(() => {
                    const rivalRemaining = rivalHearts.filter(h => h === true).length;
                    if (rivalRemaining > 0) {
                        for (let i = rivalHearts.length - 1; i >= 0; i--) {
                            if (rivalHearts[i]) {
                                rivalHearts[i] = false;
                                break;
                            }
                        }
                        updateRivalUI();
                        const rivalLeft = rivalHearts.filter(h => h === true).length;
                        if (rivalLeft === 1) {
                            playOof();
                        }
                        if (rivalLeft === 0) {
                            const msgDiv = document.createElement('div');
                            msgDiv.className = 'msg';
                            msgDiv.innerHTML = `<span class="sender">🎮 SISTEMA:</span> ${rivalName} ha perdido todos sus corazones 💀`;
                            chatMessages.appendChild(msgDiv);
                            chatMessages.scrollTop = chatMessages.scrollHeight;
                            playVineBoom();
                            setTimeout(() => { playGameOverMusic(); }, 300);
                        }
                    }
                }, 500);
            }
        }

        // === CHAT ===
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.innerHTML = `<span class="sender">${playerEmoji} ${playerName}:</span> ${text}`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            chatInput.value = '';
            if (isMultiplayer && rivalConnected) {
                setTimeout(() => {
                    const respuestas = ['👍', '😄', 'ok', 'jaja', 'buena', 'si', 'no', '🤔', '😎', '🔥'];
                    const reply = respuestas[Math.floor(Math.random() * respuestas.length)];
                    const replyDiv = document.createElement('div');
                    replyDiv.className = 'msg';
                    replyDiv.innerHTML = `<span class="sender">${rivalEmoji} ${rivalName}:</span> ${reply}`;
                    chatMessages.appendChild(replyDiv);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }, 600 + Math.random() * 1000);
            }
        }

        // === MULTIJUGADOR ===
        function createRoom() {
            const code = String(Math.floor(10000 + Math.random() * 90000));
            roomCode = code;
            isAdmin = true;
            isMultiplayer = true;
            rivalConnected = true;
            playerName = 'ADMIN';
            playerEmoji = '👑';
            playerLabel.textContent = '👑 ADMIN';
            rivalName = 'JUGADOR 2';
            rivalEmoji = '👤';
            rivalLabel.textContent = '👤 JUGADOR 2';
            
            // Guardar sala activa
            activeRooms[code] = { admin: true, players: 1 };

            codeDisplay.textContent = code;
            codeDisplay.style.display = 'block';
            modalInput.style.display = 'none';
            modalTitle.textContent = '🎮 Sala Creada';
            modalDesc.textContent = 'Comparte este código con tu rival';
            modalButtons.style.display = 'none';
            modalAdminButtons.style.display = 'flex';
            
            rivalHeartsEl.classList.add('active');
            chatContainer.classList.add('active');
            exitRoomBtn.style.display = 'block';
            multiplayerBtn.textContent = '👥 Sala: ' + code;
            multiplayerBtn.disabled = true;
            
            rivalHearts = [true, true, true];
            updateRivalUI();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.innerHTML = `<span class="sender">🎮 SISTEMA:</span> Sala creada. Código: ${code}`;
            chatMessages.appendChild(msgDiv);
            
            modalOverlay.classList.remove('active');
        }

        function joinRoom() {
            const code = modalInput.value.trim();
            if (code.length !== 5 || !/^\d{5}$/.test(code)) {
                modalDesc.textContent = '❌ Código inválido. Debe ser de 5 dígitos.';
                modalDesc.style.color = '#ff6b7c';
                return;
            }
            
            // Verificar si la sala existe
            if (!activeRooms[code]) {
                modalDesc.textContent = '❌ Sala no encontrada. Verifica el código.';
                modalDesc.style.color = '#ff6b7c';
                return;
            }
            
            if (activeRooms[code].players >= 2) {
                modalDesc.textContent = '❌ La sala está llena. Máximo 2 jugadores.';
                modalDesc.style.color = '#ff6b7c';
                return;
            }
            
            // Unirse a la sala
            roomCode = code;
            isAdmin = false;
            isMultiplayer = true;
            rivalConnected = true;
            playerName = 'JUGADOR';
            playerEmoji = '👤';
            playerLabel.textContent = '👤 JUGADOR';
            rivalName = 'ADMIN';
            rivalEmoji = '👑';
            rivalLabel.textContent = '👑 ADMIN';
            
            activeRooms[code].players = 2;
            
            modalOverlay.classList.remove('active');
            
            rivalHeartsEl.classList.add('active');
            chatContainer.classList.add('active');
            exitRoomBtn.style.display = 'block';
            multiplayerBtn.textContent = '👥 Sala: ' + code;
            multiplayerBtn.disabled = true;
            
            rivalHearts = [true, true, true];
            updateRivalUI();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.innerHTML = `<span class="sender">🎮 SISTEMA:</span> Te has unido a la sala ${code}`;
            chatMessages.appendChild(msgDiv);
        }

        function exitRoom() {
            if (confirm('¿Estás seguro de que quieras salir de la sala?')) {
                if (roomCode && activeRooms[roomCode]) {
                    delete activeRooms[roomCode];
                }
                isMultiplayer = false;
                isAdmin = false;
                rivalConnected = false;
                roomCode = '';
                playerName = 'TÚ';
                playerEmoji = '👤';
                playerLabel.textContent = '👤 TÚ';
                rivalName = 'RIVAL';
                rivalEmoji = '👤';
                rivalLabel.textContent = '👤 RIVAL';
                rivalHeartsEl.classList.remove('active');
                chatContainer.classList.remove('active');
                exitRoomBtn.style.display = 'none';
                multiplayerBtn.textContent = '🎮 Multijugador';
                multiplayerBtn.disabled = false;
                chatMessages.innerHTML = '';
                rivalHearts = [true, true, true];
                updateRivalUI();
                rivalContainer.querySelectorAll('.rival-heart').forEach(el => {
                    el.classList.remove('lost');
                    el.textContent = '❤️';
                });
            }
        }

        function kickPlayer() {
            if (!isAdmin) return;
            if (confirm('¿Expulsar al jugador de la sala?')) {
                rivalConnected = false;
                const msgDiv = document.createElement('div');
                msgDiv.className = 'msg';
                msgDiv.innerHTML = `<span class="sender">🎮 SISTEMA:</span> El jugador ha sido expulsado.`;
                chatMessages.appendChild(msgDiv);
                rivalHeartsEl.classList.remove('active');
                rivalHearts = [true, true, true];
                updateRivalUI();
                if (roomCode && activeRooms[roomCode]) {
                    activeRooms[roomCode].players = 1;
                }
            }
        }

        function closeRoom() {
            if (!isAdmin) return;
            if (confirm('¿Cerrar la sala? Todos los jugadores serán desconectados.')) {
                if (roomCode && activeRooms[roomCode]) {
                    delete activeRooms[roomCode];
                }
                exitRoom();
                modalOverlay.classList.remove('active');
            }
        }

        // === YOUTUBE ===
        function loadYouTubeVideo() {
            let url = searchInput.value.trim();
            if (!url) {
                videoContainer.innerHTML = `<div style="color:#ff6b7c;text-align:center;padding:2rem;font-size:1.1rem;">⚠️ Por favor, ingresa una URL de YouTube</div>`;
                youtubeResults.classList.add('active');
                youtubeResults.classList.remove('hidden');
                return;
            }
            let videoId = null;
            let match = url.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&?]+)/);
            if (match) videoId = match[1];
            match = url.match(/youtube\.com\/embed\/([^&?]+)/);
            if (match) videoId = match[1];
            if (!videoId) {
                videoContainer.innerHTML = `<div style="color:#ff6b7c;text-align:center;padding:2rem;font-size:1.1rem;">⚠️ URL no válida. Usa formato: https://youtu.be/ID o https://youtube.com/watch?v=ID</div>`;
                youtubeResults.classList.add('active');
                youtubeResults.classList.remove('hidden');
                return;
            }
            const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=0&rel=0`;
            videoContainer.innerHTML = `
                <iframe src="${embedUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                <div class="video-title">▶ ${videoId}</div>
            `;
            youtubeResults.classList.add('active');
            youtubeResults.classList.remove('hidden');
        }

        function closeResults() {
            youtubeResults.classList.remove('active');
            videoContainer.innerHTML = '';
        }

        // === INICIALIZAR ===
        function init() {
            resetHearts();

            heartElements.forEach(el => {
                el.removeEventListener('click', handleHeartClick);
                el.addEventListener('click', handleHeartClick);
            });

            resetBtn.addEventListener('click', resetHearts);
            goResetBtn.addEventListener('click', resetHearts);

            searchBtn.addEventListener('click', loadYouTubeVideo);
            searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loadYouTubeVideo(); });
            closeResultsBtn.addEventListener('click', closeResults);

            multiplayerBtn.addEventListener('click', () => {
                if (isMultiplayer) return;
                modalOverlay.classList.add('active');
                modalTitle.textContent = '🎮 Multijugador';
                modalDesc.textContent = 'Crea una sala o únete con un código';
                modalDesc.style.color = '#ffb3b3cc';
                modalInput.style.display = 'block';
                modalInput.value = '';
                modalInput.placeholder = 'Código de 5 dígitos';
                codeDisplay.style.display = 'none';
                modalButtons.style.display = 'flex';
                modalAdminButtons.style.display = 'none';
            });

            modalJoinBtn.addEventListener('click', joinRoom);
            modalCreateBtn.addEventListener('click', createRoom);
            modalCancelBtn.addEventListener('click', () => { modalOverlay.classList.remove('active'); });
            modalKickBtn.addEventListener('click', kickPlayer);
            modalCloseBtn.addEventListener('click', closeRoom);

            exitRoomBtn.addEventListener('click', exitRoom);

            chatSendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') modalOverlay.classList.remove('active');
            });

            console.log('❤️ NoTeRias · Multijugador con validación de código');
            console.log('📁 Archivos necesarios: GameOver.mp3, AyNo.mp3, Ay.mp3, Noo.mp3, WTHB.mp3, VineBoom.mp3, oof.mp3, Log0.png');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        window.resetHearts = resetHearts;
    })();
</script>
</body>
</html>
