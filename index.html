<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{background:#0a0a1a;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Komika Axis','Comic Sans MS',cursive;margin:0;padding:20px;overflow-x:hidden}
body.shaking{animation:shakeWithBlur .5s ease-in-out}
@keyframes shakeWithBlur{0%,100%{transform:translate(0,0)rotate(0);filter:blur(0)}10%{transform:translate(-12px,8px)rotate(-2deg);filter:blur(3px)}20%{transform:translate(12px,-8px)rotate(2deg);filter:blur(4px)}30%{transform:translate(-8px,12px)rotate(-1.5deg);filter:blur(3px)}40%{transform:translate(8px,-12px)rotate(1.5deg);filter:blur(4px)}50%{transform:translate(-12px,6px)rotate(-2deg);filter:blur(5px)}60%{transform:translate(12px,-6px)rotate(2deg);filter:blur(4px)}70%{transform:translate(-6px,10px)rotate(-1deg);filter:blur(3px)}80%{transform:translate(6px,-10px)rotate(1deg);filter:blur(3px)}90%{transform:translate(-8px,4px)rotate(-.5deg);filter:blur(2px)}100%{transform:translate(0,0)rotate(0);filter:blur(0)}}
.main-container{display:flex;flex-direction:column;align-items:center;gap:1rem;width:100%;max-width:850px;transition:opacity .5s,filter .5s}
.main-container.game-over-mode{opacity:.1;filter:blur(8px);pointer-events:none}
.logo-container{width:100%;text-align:center;padding:.2rem 0;cursor:pointer;position:relative}
.logo-container.shaking-logo{animation:logoShakeStrong .4s ease-in-out 3}
.logo-container.shaking-loop{animation:logoShakeStrong .4s ease-in-out infinite}
@keyframes logoShakeStrong{0%,100%{transform:translate(0,0)rotate(0);filter:blur(0)}10%{transform:translate(-14px,10px)rotate(-3deg);filter:blur(4px)}20%{transform:translate(14px,-10px)rotate(3deg);filter:blur(5px)}30%{transform:translate(-10px,14px)rotate(-2.5deg);filter:blur(4px)}40%{transform:translate(10px,-14px)rotate(2.5deg);filter:blur(5px)}50%{transform:translate(-14px,8px)rotate(-3deg);filter:blur(6px)}60%{transform:translate(14px,-8px)rotate(3deg);filter:blur(5px)}70%{transform:translate(-8px,12px)rotate(-2deg);filter:blur(4px)}80%{transform:translate(8px,-12px)rotate(2deg);filter:blur(4px)}90%{transform:translate(-10px,6px)rotate(-1.5deg);filter:blur(3px)}100%{transform:translate(0,0)rotate(0);filter:blur(0)}}
.logo-text{font-size:5rem;font-weight:bold;letter-spacing:8px;background:linear-gradient(180deg,#ff6b7c 0%,#ff2b4f 40%,#cc0018 70%,#880010 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 8px 25px rgba(255,43,79,.4));position:relative;display:inline-block}
.logo-text::after{content:'';position:absolute;bottom:-8px;left:10%;width:80%;height:4px;background:linear-gradient(90deg,transparent,#ff2b4f,#ff6b7c,#ff2b4f,transparent);border-radius:2px;filter:blur(1px);transition:all .3s}
.logo-text.switched::after{background:linear-gradient(90deg,transparent,#ff6b7c,#ff2b4f,#ff6b7c,transparent);width:60%}
.logo-sub{font-size:1rem;color:#ff6b7c88;letter-spacing:10px;margin-top:.2rem;text-transform:uppercase}
.logo-sub.switched{color:#ff6b7c44;letter-spacing:4px}
.top-buttons{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;width:100%}
.how-to-play-btn,.multiplayer-btn,.exit-mp-btn{font-family:'Komika Axis',cursive;padding:.6rem 2rem;border-radius:60px;cursor:pointer;transition:all .3s;text-transform:uppercase;letter-spacing:2px}
.how-to-play-btn{background:transparent;border:2px solid #ff6b7c66;color:#ff6b7c88;font-size:1.1rem}
.how-to-play-btn:hover{background:#ff6b7c22;border-color:#ff6b7c}
.how-to-play-btn.switched{font-size:1.3rem;border-color:#ff6b7c88;color:#ff6b7cbb;animation:btnPulse 1s infinite alternate}
.multiplayer-btn{background:linear-gradient(135deg,#6b7cff,#2838dd);border:none;color:#fff;font-size:1.2rem;font-weight:bold;box-shadow:0 4px 0 #1a2a88,0 8px 25px rgba(43,79,255,.25)}
.multiplayer-btn:hover{background:linear-gradient(135deg,#7c8cff,#3848ee);transform:scale(1.02)}
.multiplayer-btn.active{background:linear-gradient(135deg,#ff3b5c,#dd0028);box-shadow:0 4px 0 #881a2a,0 8px 25px rgba(255,43,79,.25)}
.exit-mp-btn{background:transparent;border:2px solid #ff6b7c44;color:#ff6b7c66;font-size:.9rem;display:none}
.exit-mp-btn.visible{display:inline-block}
@keyframes btnPulse{0%{box-shadow:0 0 20px rgba(255,43,79,.1)}100%{box-shadow:0 0 50px rgba(255,43,79,.3)}}
.heart-counter{background:rgba(26,26,46,.85);backdrop-filter:blur(6px);border-radius:3rem;padding:1.5rem 2.5rem 1.2rem;box-shadow:0 20px 40px rgba(0,0,0,.8),0 0 0 3px #ff3b5c55 inset;text-align:center;width:100%;border:2px solid #ff6b7c66}
.player-label{font-size:1rem;color:#ff6b7caa;letter-spacing:4px;text-transform:uppercase}
.hearts-container{display:flex;justify-content:center;gap:1.5rem;margin:.2rem 0 .3rem;flex-wrap:wrap}
.heart{font-size:5rem;cursor:pointer;transition:transform .15s,filter .2s,opacity .2s;text-shadow:0 8px 25px rgba(255,50,80,.7);filter:drop-shadow(0 8px 12px #00000077)}
.heart:hover{transform:scale(1.12);filter:drop-shadow(0 0 22px #ff3b5c)}
.heart.lost{transform:scale(.92);pointer-events:none;opacity:.4}
.heart.breaking{animation:breakHeart 1.2s forwards;pointer-events:none!important}
@keyframes breakHeart{0%{transform:scale(1)rotate(0);opacity:1}25%{transform:scale(1.4)rotate(-15deg)}50%{transform:scale(1.6)rotate(10deg)translateY(-20px)}75%{transform:scale(1.8)rotate(-5deg)translateY(-40px);opacity:.8}100%{transform:scale(2.5)rotate(20deg)translateY(-80px);opacity:0}}
.reset-btn{font-family:'Komika Axis',cursive;background:#ff3b5c;border:none;color:#1a1a2e;font-size:1.4rem;font-weight:bold;padding:.6rem 1.8rem;margin-top:.3rem;border-radius:60px;cursor:pointer;box-shadow:0 6px 0 #881a2a,0 12px 30px #000000aa;text-transform:uppercase;letter-spacing:3px;border:2px solid #ff9eae;display:none}
.reset-btn.visible{display:block}
.reset-btn:hover{background:#ff4f6e;transform:scale(1.03)}
.color-picker-container{display:flex;justify-content:center;gap:.8rem;margin-top:.3rem}
.color-btn{width:32px;height:32px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s}
.color-btn:hover{transform:scale(1.15)}
.color-btn.active{border-color:#fff;box-shadow:0 0 20px rgba(255,255,255,.3)}
.players-container{display:none;gap:2rem;width:100%;flex-wrap:wrap;justify-content:center;margin-top:.5rem}
.players-container.active{display:flex}
.player-card{flex:1;min-width:280px;background:rgba(26,26,46,.7);backdrop-filter:blur(6px);border-radius:2rem;padding:1.2rem 1.5rem 1rem;border:2px solid #ff6b7c44}
.player-card .player-label{font-size:1.2rem;color:#ff6b7caa;letter-spacing:4px;text-align:center;text-transform:uppercase}
.player-card .hearts-container{display:flex;justify-content:center;gap:1.2rem;flex-wrap:wrap}
.player-card .heart{font-size:4.5rem;cursor:pointer}
.player-card .reset-btn{font-size:1rem;padding:.4rem 1.2rem;margin-top:.3rem}
.player-card .player-status{text-align:center;font-size:.9rem;color:#ff6b7c66;margin-top:.2rem;font-family:'Segoe UI',Arial,sans-serif}
.player-card .player-status.win{color:#ff6b7c;font-size:1.2rem;animation:statusPulse .8s infinite alternate}
@keyframes statusPulse{0%{opacity:.6;transform:scale(1)}100%{opacity:1;transform:scale(1.05)}}
.custom-player{width:100%;background:rgba(26,26,46,.7);backdrop-filter:blur(8px);border-radius:2rem;padding:1.2rem 1.5rem 1.5rem;border:2px solid #ff6b7c44;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.player-container{position:relative;width:100%;background:#0a0a1a;border-radius:1.2rem;overflow:hidden;aspect-ratio:16/9;border:2px solid #ff6b7c33}
.player-container iframe{width:100%;height:100%;border:none;display:block}
.player-container .placeholder{display:flex;flex-direction:column;justify-content:center;align-items:center;width:100%;height:100%;color:#ff6b7c44;font-size:1.5rem;font-family:'Segoe UI',Arial,sans-serif;gap:.5rem;background:#0a0a1a}
.player-container .placeholder .icon{font-size:4rem}
.player-container .placeholder .msg{font-size:1.1rem;color:#ff6b7c66;letter-spacing:2px}
.player-controls{display:flex;gap:.8rem;margin-top:.8rem;align-items:center;flex-wrap:wrap;justify-content:center}
.player-controls input{flex:1;min-width:160px;padding:.7rem 1.2rem;border-radius:60px;border:2px solid #ff6b7c33;background:rgba(255,255,255,.06);color:#fff;font-size:.9rem;font-family:'Segoe UI',Arial,sans-serif;outline:none}
.player-controls input::placeholder{color:#8888aa}
.player-controls input:focus{border-color:#ff3b5c;background:rgba(255,255,255,.10);box-shadow:0 0 30px #ff3b5c22}
.player-controls button{padding:.7rem 1.8rem;border-radius:60px;border:none;background:linear-gradient(135deg,#ff3b5c,#dd0028);color:#1a1a2e;font-size:.9rem;font-weight:bold;cursor:pointer;font-family:'Komika Axis',cursive;text-transform:uppercase;letter-spacing:1.5px;box-shadow:0 4px 0 #881a2a,0 8px 25px rgba(255,43,79,.25)}
.player-controls button:hover{background:linear-gradient(135deg,#ff4f6e,#ee0038);transform:scale(1.02)}
.player-controls button.switched{background:linear-gradient(135deg,#ff6b7c,#ff2b4f);font-size:1.1rem;animation:btnPulse 1s infinite alternate}
.credits{font-size:.8rem;color:#ff6b7c44;letter-spacing:2px;text-align:center;padding:.2rem 0;border-top:1px solid #ff6b7c22;width:100%;max-width:500px}
.credits.switched{color:#ff6b7c66;font-size:.9rem}
.vhs-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;z-index:60000;overflow:hidden}
.vhs-overlay.active{display:block}
.vhs-overlay #vhsCanvas{width:100%;height:100%;display:block}
.vhs-overlay #vhsExit{position:fixed;top:20px;right:20px;z-index:60001;background:rgba(255,43,79,.15);border:2px solid #ff6b7c44;color:#ff6b7c88;padding:8px 16px;border-radius:30px;cursor:pointer;font-family:'Segoe UI',Arial,sans-serif;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;backdrop-filter:blur(10px)}
.vhs-overlay #vhsExit:hover{background:rgba(255,43,79,.25);border-color:#ff6b7c88;color:#ff6b7c}
.vhs-overlay #vhsCrosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff6b7c33;font-size:1.5rem;z-index:60001;pointer-events:none;opacity:.3}
.vhs-overlay #vhsInfo{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#ff6b7c44;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;z-index:60001;pointer-events:none}
.vhs-overlay #vhsControls{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);color:#ff6b7c33;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;z-index:60001;pointer-events:none;background:rgba(0,0,0,.5);padding:6px 16px;border-radius:20px;border:1px solid #ff6b7c22}
.vhs-overlay .vhs-message{position:fixed;top:35%;left:50%;transform:translateX(-50%);color:#ff6b7c;font-size:1.2rem;font-family:'Segoe UI',Arial,sans-serif;z-index:60001;background:rgba(0,0,0,.6);padding:12px 24px;border-radius:12px;border:1px solid #ff6b7c33;backdrop-filter:blur(10px);text-align:center;pointer-events:none;opacity:0;transition:opacity .4s}
.vhs-overlay .vhs-message.show{opacity:1}
.game-over-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;justify-content:center;align-items:center;flex-direction:column;z-index:10000;animation:undertaleFadeIn 1.2s forwards}
.game-over-overlay.show{display:flex}
@keyframes undertaleFadeIn{0%{opacity:0}60%{opacity:1;background:#0a0005}100%{opacity:1;background:#0a0005}}
.go-text{font-size:6rem;font-weight:bold;color:#fff;text-shadow:0 0 40px #ff2b4f,0 0 80px #ff2b4f,0 0 120px #ff2b4f;animation:goTextDrop 1.2s cubic-bezier(.22,.61,.36,1) forwards;letter-spacing:12px;transform:translateY(-200px);opacity:0}
@keyframes goTextDrop{0%{transform:translateY(-200px);opacity:0}100%{transform:translateY(0);opacity:1}}
.go-text::after{content:'';display:block;width:200px;height:3px;margin:10px auto 0;background:linear-gradient(90deg,transparent,#ff2b4f,transparent);animation:goLinePulse 2s infinite alternate}
@keyframes goLinePulse{0%{opacity:.3;width:100px}100%{opacity:1;width:300px}}
.go-sub{font-size:1.8rem;color:#ff8888;margin-top:1.2rem;text-shadow:0 0 30px #ff2b4f55;opacity:0;animation:goSubFade .8s .6s forwards,goSubPulse 2s .5s infinite alternate;text-align:center;padding:0 1rem;cursor:pointer}
.go-sub.shaking-text{animation:textShake .15s infinite}
@keyframes textShake{0%,100%{transform:translate(0,0)}20%{transform:translate(-4px,3px)rotate(-1deg)}40%{transform:translate(4px,-3px)rotate(1deg)}60%{transform:translate(-3px,4px)rotate(-.5deg)}80%{transform:translate(3px,-4px)rotate(.5deg)}}
@keyframes goSubFade{0%{opacity:0}100%{opacity:1}}
@keyframes goSubPulse{0%{opacity:.6}100%{opacity:1}}
.go-reset-btn{font-family:'Komika Axis',cursive;background:#ff3b5c;border:none;color:#1a1a2e;font-size:1.8rem;font-weight:bold;padding:.9rem 2.8rem;margin-top:2rem;border-radius:60px;cursor:pointer;box-shadow:0 8px 0 #881a2a,0 12px 30px #000000aa;text-transform:uppercase;letter-spacing:3px;border:2px solid #ff9eae;transform:translateY(200px);opacity:0;animation:goBtnRise 1s cubic-bezier(.22,.61,.36,1) .4s forwards}
@keyframes goBtnRise{0%{transform:translateY(200px);opacity:0}100%{transform:translateY(0);opacity:1}}
.go-reset-btn:hover{background:#ff4f6e;transform:scale(1.05)}
body.game-over-active{overflow:hidden}
@media(max-width:650px){.players-container{flex-direction:column}.logo-text{font-size:3.5rem;letter-spacing:4px}.heart{font-size:3.8rem}.game-over-overlay .go-text{font-size:3.5rem;letter-spacing:6px}.player-card .heart{font-size:3.5rem}}
</style>
</head>

<script>
(function(){
// ======================== ESTADO ========================
let logoState=0,isGameOver=!1,isMusicPlaying=!1,isMultiplayer=!1;
let hearts=[!0,!0,!0],heartColor='#ff2b4f';
const players={1:{hearts:[!0,!0,!0],color:'#ff2b4f',won:!1},2:{hearts:[!0,!0,!0],color:'#ff2b4f',won:!1}};
// ======================== DOM ========================
const L=document.getElementById('logoContainer'),LT=document.getElementById('logoText'),LS=document.getElementById('logoSub');
const HTP=document.getElementById('howToPlayBtn'),MP=document.getElementById('multiplayerBtn'),EMP=document.getElementById('exitMpBtn');
const HC=document.getElementById('heartCounter'),HE=document.querySelectorAll('#heartsContainer .heart'),RB=document.getElementById('resetBtn'),PL=document.getElementById('playerLabel');
const H1=document.querySelectorAll('#hearts1 .heart'),H2=document.querySelectorAll('#hearts2 .heart'),R1=document.getElementById('resetBtn1'),R2=document.getElementById('resetBtn2'),S1=document.getElementById('status1'),S2=document.getElementById('status2'),P1L=document.getElementById('player1Label'),P2L=document.getElementById('player2Label');
const PI=document.getElementById('playerInput'),PLB=document.getElementById('playerLoadBtn'),PIF=document.getElementById('playerIframe'),PP=document.getElementById('playerPlaceholder'),PPM=document.getElementById('playerPlaceholderMsg');
const CB=document.querySelectorAll('#colorPicker .color-btn'),PC=document.getElementById('playersContainer');
const VO=document.getElementById('vhsOverlay'),VE=document.getElementById('vhsExit'),VM=document.getElementById('vhsMessage'),VC=document.getElementById('vhsCanvas');
const GOT=document.getElementById('goText'),GOS=document.getElementById('goSubText'),GOR=document.getElementById('goResetBtn'),GOO=document.getElementById('gameOverOverlay'),MC=document.getElementById('mainContainer');
const CT=document.getElementById('creditsText');
// ======================== AUDIOS ========================
const GA=document.getElementById('gameOverAudio'),WA=document.getElementById('winAudio'),OA=document.getElementById('oofAudio'),UA=document.getElementById('underAudio'),LPA=document.getElementById('logoPressAudio'),SHA=document.getElementById('shhAudio'),XDA=document.getElementById('xddAudio');
function pLP(){try{LPA.currentTime=0;LPA.volume=.8;LPA.loop=!0;LPA.play()}catch(e){}}
function sLP(){try{LPA.pause();LPA.currentTime=0;LPA.loop=!1}catch(e){}}
function pSH(){try{SHA.currentTime=0;SHA.volume=.8;SHA.play()}catch(e){}}
