<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoTeRias · Corazones + VHS 3D</title>
    <link rel="icon" type="image/png" href="Log0.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Komika Axis', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            margin: 0;
            padding: 20px;
            transition: transform 0.05s, filter 0.05s;
            overflow-x: hidden;
        }
        body.shaking {
            animation: shakeWithBlur 0.5s ease-in-out;
        }
        @keyframes shakeWithBlur {
            0%,100% { transform: translate(0,0) rotate(0deg); filter: blur(0px); }
            10% { transform: translate(-12px,8px) rotate(-2deg); filter: blur(3px); }
            20% { transform: translate(12px,-8px) rotate(2deg); filter: blur(4px); }
            30% { transform: translate(-8px,12px) rotate(-1.5deg); filter: blur(3px); }
            40% { transform: translate(8px,-12px) rotate(1.5deg); filter: blur(4px); }
            50% { transform: translate(-12px,6px) rotate(-2deg); filter: blur(5px); }
            60% { transform: translate(12px,-6px) rotate(2deg); filter: blur(4px); }
            70% { transform: translate(-6px,10px) rotate(-1deg); filter: blur(3px); }
            80% { transform: translate(6px,-10px) rotate(1deg); filter: blur(3px); }
            90% { transform: translate(-8px,4px) rotate(-0.5deg); filter: blur(2px); }
            100% { transform: translate(0,0) rotate(0deg); filter: blur(0px); }
        }
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 850px;
            transition: opacity 0.5s ease, filter 0.5s ease;
        }
        .main-container.game-over-mode { opacity: 0.1; filter: blur(8px); pointer-events: none; }

        .logo-container {
            width: 100%;
            text-align: center;
            padding: 0.2rem 0;
            margin-bottom: -0.3rem;
            cursor: pointer;
            position: relative;
        }
        .logo-container.shaking-logo { animation: logoShakeStrong 0.4s ease-in-out 3; }
        .logo-container.shaking-loop { animation: logoShakeStrong 0.4s ease-in-out infinite; }
        @keyframes logoShakeStrong {
            0%,100% { transform: translate(0,0) rotate(0deg); filter: blur(0px); }
            10% { transform: translate(-14px,10px) rotate(-3deg); filter: blur(4px); }
            20% { transform: translate(14px,-10px) rotate(3deg); filter: blur(5px); }
            30% { transform: translate(-10px,14px) rotate(-2.5deg); filter: blur(4px); }
            40% { transform: translate(10px,-14px) rotate(2.5deg); filter: blur(5px); }
            50% { transform: translate(-14px,8px) rotate(-3deg); filter: blur(6px); }
            60% { transform: translate(14px,-8px) rotate(3deg); filter: blur(5px); }
            70% { transform: translate(-8px,12px) rotate(-2deg); filter: blur(4px); }
            80% { transform: translate(8px,-12px) rotate(2deg); filter: blur(4px); }
            90% { transform: translate(-10px,6px) rotate(-1.5deg); filter: blur(3px); }
            100% { transform: translate(0,0) rotate(0deg); filter: blur(0px); }
        }
        .logo-text {
            font-family: 'Komika Axis', 'Comic Sans MS', 'Chalkboard SE', cursive;
            font-size: 5rem;
            font-weight: bold;
            letter-spacing: 8px;
            background: linear-gradient(180deg, #ff6b7c 0%, #ff2b4f 40%, #cc0018 70%, #880010 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 8px 25px rgba(255,43,79,0.4));
            position: relative;
            display: inline-block;
            transition: transform 0.15s ease, filter 0.3s ease;
        }
        .logo-text:hover { transform: scale(1.02); }
        .logo-text:active { transform: scale(0.95); }
        .logo-text::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 10%;
            width: 80%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #ff2b4f, #ff6b7c, #ff2b4f, transparent);
            border-radius: 2px;
            filter: blur(1px);
            transition: all 0.3s ease;
        }
        .logo-text.switched::after {
            background: linear-gradient(90deg, transparent, #ff6b7c, #ff2b4f, #ff6b7c, transparent);
            width: 60%;
        }
        .logo-sub {
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            font-size: 1rem;
            color: #ff6b7c88;
            letter-spacing: 10px;
            margin-top: 0.2rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .logo-sub.switched { color: #ff6b7c44; letter-spacing: 4px; }

        .credits {
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            font-size: 0.8rem;
            color: #ff6b7c44;
            letter-spacing: 2px;
            text-align: center;
            margin-top: -0.3rem;
            padding: 0.2rem 0;
            border-top: 1px solid #ff6b7c22;
            width: 100%;
            max-width: 500px;
            transition: all 0.3s ease;
        }
        .credits.switched { color: #ff6b7c66; font-size: 0.9rem; letter-spacing: 1px; }
        .credits span { color: #ff6b7c66; }
        .credits.switched span { color: #ff6b7caa; }

        .how-to-play-btn {
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            background: transparent;
            border: 2px solid #ff6b7c66;
            color: #ff6b7c88;
            font-size: 1.1rem;
            padding: 0.6rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255,43,79,0.1);
        }
        .how-to-play-btn:hover { background: #ff6b7c22; border-color: #ff6b7c; box-shadow: 0 0 40px rgba(255,43,79,0.2); transform: scale(1.02); }
        .how-to-play-btn.switched {
            font-size: 1.3rem;
            border-color: #ff6b7c88;
            color: #ff6b7cbb;
            animation: btnPulse 1s ease-in-out infinite alternate;
        }
        @keyframes btnPulse {
            0% { box-shadow: 0 0 20px rgba(255,43,79,0.1); }
            100% { box-shadow: 0 0 50px rgba(255,43,79,0.3); }
        }

        .top-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .multiplayer-btn {
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            background: linear-gradient(135deg, #6b7cff, #2838dd);
            border: none;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 0.7rem 2.5rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 0 #1a2a88, 0 8px 25px rgba(43,79,255,0.25);
        }
        .multiplayer-btn:hover { background: linear-gradient(135deg, #7c8cff, #3848ee); transform: scale(1.02); }
        .multiplayer-btn:active { transform: translateY(4px); box-shadow: 0 0px 0 #1a2a88; }
        .multiplayer-btn.active {
            background: linear-gradient(135deg, #ff3b5c, #dd0028);
            box-shadow: 0 4px 0 #881a2a, 0 8px 25px rgba(255,43,79,0.25);
        }
        .multiplayer-btn.active:hover { background: linear-gradient(135deg, #ff4f6e, #ee0038); }

        .exit-mp-btn {
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            background: transparent;
            border: 2px solid #ff6b7c44;
            color: #ff6b7c66;
            font-size: 0.9rem;
            padding: 0.4rem 1.5rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: none;
        }
        .exit-mp-btn:hover { border-color: #ff6b7c88; color: #ff6b7caa; background: #ff6b7c11; }
        .exit-mp-btn.visible { display: inline-block; }

        .heart-counter {
            background: rgba(26,26,46,0.85);
            backdrop-filter: blur(6px);
            border-radius: 3rem;
            padding: 1.5rem 2.5rem 1.2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 3px #ff3b5c55 inset;
            text-align: center;
            width: 100%;
            border: 2px solid #ff6b7c66;
            position: relative;
            transition: all 0.3s ease;
        }
        .heart-counter .player-label {
            font-size: 1rem;
            color: #ff6b7caa;
            letter-spacing: 4px;
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .hearts-container {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 0.2rem 0 0.3rem 0;
            flex-wrap: wrap;
        }
        .heart {
            font-size: 5rem;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.15s ease, filter 0.2s, opacity 0.2s;
            text-shadow: 0 8px 25px rgba(255,50,80,0.7);
            color: #ff2b4f;
            filter: drop-shadow(0 8px 12px #00000077);
            transform: scale(1);
            position: relative;
        }
        .heart:hover { transform: scale(1.12); filter: drop-shadow(0 0 22px #ff3b5c); }
        .heart:active { transform: scale(0.85); }
        .heart.lost { cursor: default; transform: scale(0.92); pointer-events: none; opacity: 0.4; }
        .heart.breaking {
            animation: breakHeart 1.2s ease-out forwards;
            pointer-events: none !important;
        }
        @keyframes breakHeart {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            25% { transform: scale(1.4) rotate(-15deg); }
            50% { transform: scale(1.6) rotate(10deg) translateY(-20px); }
            75% { transform: scale(1.8) rotate(-5deg) translateY(-40px); opacity: 0.8; }
            100% { transform: scale(2.5) rotate(20deg) translateY(-80px); opacity: 0; }
        }
        .reset-btn {
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            background: #ff3b5c;
            border: none;
            color: #1a1a2e;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 0.6rem 1.8rem;
            margin-top: 0.3rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #881a2a, 0 12px 30px #000000aa;
            transition: all 0.08s linear;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 2px solid #ff9eae;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            display: none;
        }
        .reset-btn.visible { display: block; }
        .reset-btn:hover { background: #ff4f6e; transform: scale(1.03); box-shadow: 0 6px 0 #881a2a, 0 15px 35px #000000dd; }
        .reset-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #881a2a, 0 8px 25px #000; }

        .color-picker-container {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 0.3rem;
            flex-wrap: wrap;
        }
        .color-picker-container .color-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .color-picker-container .color-btn:hover { transform: scale(1.15); }
        .color-picker-container .color-btn.active { border-color: #ffffff; box-shadow: 0 0 20px rgba(255,255,255,0.3); }

        .players-container {
            display: none;
            gap: 2rem;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 0.5rem;
        }
        .players-container.active { display: flex; }
        .player-card {
            flex: 1;
            min-width: 280px;
            background: rgba(26,26,46,0.7);
            backdrop-filter: blur(6px);
            border-radius: 2rem;
            padding: 1.2rem 1.5rem 1rem;
            border: 2px solid #ff6b7c44;
            transition: all 0.3s ease;
        }
        .player-card .player-label {
            font-size: 1.2rem;
            color: #ff6b7caa;
            letter-spacing: 4px;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
            transition: all 0.3s ease;
        }
        .player-card .hearts-container {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }
        .player-card .heart {
            font-size: 4.5rem;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.15s ease, filter 0.2s, opacity 0.2s;
            text-shadow: 0 8px 25px rgba(255,50,80,0.7);
            filter: drop-shadow(0 8px 12px #00000077);
            transform: scale(1);
        }
        .player-card .heart:hover { transform: scale(1.12); filter: drop-shadow(0 0 22px currentColor); }
        .player-card .heart:active { transform: scale(0.85); }
        .player-card .heart.lost { cursor: default; transform: scale(0.92); pointer-events: none; opacity: 0.4; }
        .player-card .heart.breaking {
            animation: breakHeart 1.2s ease-out forwards;
            pointer-events: none !important;
        }
        .player-card .reset-btn {
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            background: #ff3b5c;
            border: none;
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: bold;
            padding: 0.4rem 1.2rem;
            margin-top: 0.3rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 4px 0 #881a2a, 0 8px 20px #000000aa;
            transition: all 0.08s linear;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid #ff9eae;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            display: none;
        }
        .player-card .reset-btn.visible { display: block; }
        .player-card .reset-btn:hover { background: #ff4f6e; transform: scale(1.03); }
        .player-card .reset-btn:active { transform: translateY(4px); box-shadow: 0 0px 0 #881a2a; }
        .player-card .player-status {
            text-align: center;
            font-size: 0.9rem;
            color: #ff6b7c66;
            margin-top: 0.2rem;
            letter-spacing: 2px;
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: all 0.3s ease;
            min-height: 1.8rem;
        }
        .player-card .player-status.win {
            color: #ff6b7c;
            font-size: 1.2rem;
            animation: statusPulse 0.8s ease-in-out infinite alternate;
        }
        @keyframes statusPulse {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }
        .player-card .color-picker-container {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 0.3rem;
            flex-wrap: wrap;
        }
        .player-card .color-picker-container .color-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .player-card .color-picker-container .color-btn:hover { transform: scale(1.15); }
        .player-card .color-picker-container .color-btn.active { border-color: #ffffff; box-shadow: 0 0 20px rgba(255,255,255,0.3); }

        .custom-player {
            width: 100%;
            background: rgba(26,26,46,0.7);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.2rem 1.5rem 1.5rem;
            border: 2px solid #ff6b7c44;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        .custom-player .player-container {
            position: relative;
            width: 100%;
            background: #0a0a1a;
            border-radius: 1.2rem;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            border: 2px solid #ff6b7c33;
        }
        .custom-player .player-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .custom-player .player-container .placeholder {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            color: #ff6b7c44;
            font-size: 1.5rem;
            font-family: 'Segoe UI', Arial, sans-serif;
            gap: 0.5rem;
            background: #0a0a1a;
        }
        .custom-player .player-container .placeholder .icon { font-size: 4rem; }
        .custom-player .player-container .placeholder .msg {
            font-size: 1.1rem;
            color: #ff6b7c66;
            letter-spacing: 2px;
        }
        .player-controls {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .player-controls input {
            flex: 1;
            min-width: 160px;
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
            border: 2px solid #ff6b7c33;
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.9rem;
            font-family: 'Segoe UI', Arial, sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }
        .player-controls input::placeholder { color: #8888aa; }
        .player-controls input:focus {
            border-color: #ff3b5c;
            background: rgba(255,255,255,0.10);
            box-shadow: 0 0 30px #ff3b5c22;
        }
        .player-controls button {
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            border: none;
            background: linear-gradient(135deg, #ff3b5c, #dd0028);
            color: #1a1a2e;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 0 #881a2a, 0 8px 25px rgba(255,43,79,0.25);
        }
        .player-controls button:hover { background: linear-gradient(135deg, #ff4f6e, #ee0038); transform: scale(1.02); }
        .player-controls button:active { transform: translateY(4px); box-shadow: 0 0px 0 #881a2a; }
        .player-controls button.switched {
            background: linear-gradient(135deg, #ff6b7c, #ff2b4f);
            font-size: 1.1rem;
            animation: btnPulse 1s ease-in-out infinite alternate;
        }

        .tutorial-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 50000;
            padding: 20px;
        }
        .tutorial-popup.active { display: flex; }
        .tutorial-popup .tutorial-content {
            background: #1a1a2e;
            border-radius: 2.5rem;
            padding: 2.5rem 3rem;
            max-width: 550px;
            width: 100%;
            border: 2px solid #ff6b7c55;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }
        .tutorial-popup .tutorial-content h2 {
            color: #ff6b7c;
            font-size: 2rem;
            margin-bottom: 1.2rem;
            letter-spacing: 3px;
        }
        .tutorial-popup .tutorial-content p {
            color: #ffb3b3cc;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 1rem;
            text-align: left;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .tutorial-popup .tutorial-content .close-tutorial {
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            background: #ff3b5c;
            border: none;
            color: #1a1a2e;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 0.7rem 2.5rem;
            margin-top: 1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 0 #881a2a, 0 8px 25px rgba(255,43,79,0.2);
        }
        .tutorial-popup .tutorial-content .close-tutorial:hover { background: #ff4f6e; transform: scale(1.02); }
        .tutorial-popup .tutorial-content .close-tutorial:active { transform: translateY(4px); box-shadow: 0 0px 0 #881a2a; }
        .tutorial-popup .tutorial-content .tutorial-icon { font-size: 4rem; margin-bottom: 0.5rem; }

        .vhs-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 60000;
            overflow: hidden;
        }
        .vhs-overlay.active { display: block; }
        .vhs-overlay #vhsCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .vhs-overlay #vhsExit {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 60001;
            background: rgba(255,43,79,0.15);
            border: 2px solid #ff6b7c44;
            color: #ff6b7c88;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .vhs-overlay #vhsExit:hover { background: rgba(255,43,79,0.25); border-color: #ff6b7c88; color: #ff6b7c; }
        .vhs-overlay #vhsCrosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b7c33;
            font-size: 1.5rem;
            z-index: 60001;
            pointer-events: none;
            opacity: 0.3;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .vhs-overlay #vhsInfo {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff6b7c44;
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 60001;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .vhs-overlay #vhsControls {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff6b7c33;
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 60001;
            text-align: center;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #ff6b7c22;
        }
        .vhs-overlay .vhs-message {
            position: fixed;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            color: #ff6b7c;
            font-size: 1.2rem;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-shadow: 0 0 40px rgba(255,43,79,0.3);
            z-index: 60001;
            background: rgba(0,0,0,0.6);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid #ff6b7c33;
            backdrop-filter: blur(10px);
            text-align: center;
            letter-spacing: 1px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .vhs-overlay .vhs-message.show { opacity: 1; }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10000;
            animation: undertaleFadeIn 1.2s ease-out forwards;
            overflow: hidden;
        }
        .game-over-overlay.show { display: flex; }
        @keyframes undertaleFadeIn {
            0% { opacity: 0; background: #000000; }
            60% { opacity: 1; background: #0a0005; }
            100% { opacity: 1; background: #0a0005; }
        }
        .game-over-overlay .go-text {
            font-family: 'Komika Axis', 'Comic Sans MS', 'Chalkboard SE', cursive;
            font-size: 6rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 40px #ff2b4f, 0 0 80px #ff2b4f, 0 0 120px #ff2b4f;
            animation: goTextDrop 1.2s cubic-bezier(0.22,0.61,0.36,1) forwards;
            letter-spacing: 12px;
            transform: translateY(-200px);
            opacity: 0;
        }
        @keyframes goTextDrop {
            0% { transform: translateY(-200px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .game-over-overlay .go-text::after {
            content: '';
            display: block;
            width: 200px;
            height: 3px;
            margin: 10px auto 0;
            background: linear-gradient(90deg, transparent, #ff2b4f, transparent);
            animation: goLinePulse 2s ease-in-out infinite alternate;
        }
        @keyframes goLinePulse {
            0% { opacity: 0.3; width: 100px; }
            100% { opacity: 1; width: 300px; }
        }
        .game-over-overlay .go-sub {
            font-family: 'Komika Axis', 'Comic Sans MS', 'Chalkboard SE', cursive;
            font-size: 1.8rem;
            color: #ff8888;
            margin-top: 1.2rem;
            text-shadow: 0 0 30px #ff2b4f55;
            opacity: 0;
            animation: goSubFade 0.8s ease-out 0.6s forwards, goSubPulse 2s ease-in-out infinite alternate 0.5s;
            text-align: center;
            line-height: 1.4;
            padding: 0 1rem;
        }
        .game-over-overlay .go-sub.shaking-text {
            animation: textShake 0.15s ease-in-out infinite;
        }
        @keyframes textShake {
            0%,100% { transform: translate(0,0) rotate(0deg); }
            20% { transform: translate(-4px,3px) rotate(-1deg); }
            40% { transform: translate(4px,-3px) rotate(1deg); }
            60% { transform: translate(-3px,4px) rotate(-0.5deg); }
            80% { transform: translate(3px,-4px) rotate(0.5deg); }
        }
        @keyframes goSubFade { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes goSubPulse { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        .game-over-overlay .go-reset-btn {
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            background: #ff3b5c;
            border: none;
            color: #1a1a2e;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 0.9rem 2.8rem;
            margin-top: 2rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #881a2a, 0 12px 30px #000000aa;
            transition: all 0.08s linear;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 2px solid #ff9eae;
            transform: translateY(200px);
            opacity: 0;
            animation: goBtnRise 1s cubic-bezier(0.22,0.61,0.36,1) 0.4s forwards;
        }
        @keyframes goBtnRise {
            0% { transform: translateY(200px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .game-over-overlay .go-reset-btn:hover { background: #ff4f6e; transform: scale(1.05); box-shadow: 0 8px 0 #881a2a, 0 15px 35px #000000dd; }
        .game-over-overlay .go-reset-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #881a2a, 0 8px 25px #000; }
        body.game-over-active { overflow: hidden; }

        @media (max-width: 650px) {
            .players-container { flex-direction: column; gap: 1rem; }
            .player-card { min-width: unset; }
            .logo-text { font-size: 3.5rem; letter-spacing: 4px; }
            .logo-sub { font-size: 0.8rem; letter-spacing: 6px; }
            .heart { font-size: 3.8rem; }
            .player-card .heart { font-size: 3.5rem; }
            .game-over-overlay .go-text { font-size: 3.5rem; letter-spacing: 6px; }
            .game-over-overlay .go-sub { font-size: 1.2rem; }
            .game-over-overlay .go-reset-btn { font-size: 1.3rem; padding: 0.6rem 1.8rem; }
            .credits { font-size: 0.65rem; }
            .how-to-play-btn { font-size: 0.9rem; padding: 0.5rem 1.5rem; }
            .custom-player { padding: 0.8rem 1rem; }
            .player-controls input { min-width: 120px; font-size: 0.8rem; }
            .player-controls button { font-size: 0.8rem; padding: 0.5rem 1.2rem; }
            .tutorial-popup .tutorial-content { padding: 1.8rem; }
            .tutorial-popup .tutorial-content h2 { font-size: 1.6rem; }
            .tutorial-popup .tutorial-content p { font-size: 1rem; }
            .multiplayer-btn { font-size: 1rem; padding: 0.5rem 1.8rem; }
            .top-buttons { gap: 0.5rem; }
            .heart-counter { padding: 1.2rem 1.5rem 1rem; }
            .reset-btn { font-size: 1.1rem; padding: 0.5rem 1.4rem; }
        }
        @media (max-width: 400px) {
            .heart { font-size: 3rem; }
            .player-card .heart { font-size: 2.8rem; }
            .logo-text { font-size: 2.8rem; letter-spacing: 2px; }
            .game-over-overlay .go-text { font-size: 2.8rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

                <span class="heart" data-player="1" data-index="0">❤️</span>

<!-- AUDIOS -->
<audio id="gameOverAudio" preload="auto"><source src="GameOver.mp3" type="audio/mpeg"></audio>
<audio id="winAudio" preload="auto"><source src="Win.mp3" type="audio/mpeg"></audio>
<audio id="oofAudio" preload="auto"><source src="oof.mp3" type="audio/mpeg"></audio>
<audio id="underAudio" preload="auto"><source src="under.mp3" type="audio/mpeg"></audio>
<audio id="ayNoAudio" preload="auto"><source src="AyNo.mp3" type="audio/mpeg"></audio>
<audio id="ayAudio" preload="auto"><source src="Ay.mp3" type="audio/mpeg"></audio>
<audio id="nooAudio" preload="auto"><source src="Noo.mp3" type="audio/mpeg"></audio>
<audio id="wthbAudio" preload="auto"><source src="WTHB.mp3" type="audio/mpeg"></audio>
<audio id="logoPressAudio" preload="auto" loop><source src="LogoPress.mp3" type="audio/mpeg"></audio>
<audio id="shhAudio" preload="auto"><source src="Shh.mp3" type="audio/mpeg"></audio>
<audio id="xddAudio" preload="auto"><source src="XDD.mp3" type="audio/mpeg"></audio>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    (function() {
        // ============================================================
        // ESTADO PRINCIPAL
        // ============================================================
        let logoState = 0;
        let isGameOver = false;
        let isMusicPlaying = false;
        let isMultiplayer = false;

        let hearts = [true, true, true];
        let heartColor = '#ff2b4f';

        const players = {
            1: { hearts: [true, true, true], color: '#ff2b4f', won: false },
            2: { hearts: [true, true, true], color: '#ff2b4f', won: false }
        };

        // ============================================================
        // DOM
        // ============================================================
        const logoContainer = document.getElementById('logoContainer');
        const logoText = document.getElementById('logoText');
        const logoSub = document.getElementById('logoSub');
        const howToPlayBtn = document.getElementById('howToPlayBtn');
        const creditsText = document.getElementById('creditsText');
        const goText = document.getElementById('goText');
        const goSubText = document.getElementById('goSubText');
        const goResetBtn = document.getElementById('goResetBtn');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const mainContainer = document.getElementById('mainContainer');
        const playersContainer = document.getElementById('playersContainer');
        const multiplayerBtn = document.getElementById('multiplayerBtn');
        const exitMpBtn = document.getElementById('exitMpBtn');

        const heartElements = document.querySelectorAll('#heartsContainer .heart');
        const resetBtn = document.getElementById('resetBtn');
        const playerLabel = document.getElementById('playerLabel');

        const hearts1 = document.querySelectorAll('#hearts1 .heart');
        const hearts2 = document.querySelectorAll('#hearts2 .heart');
        const resetBtn1 = document.getElementById('resetBtn1');
        const resetBtn2 = document.getElementById('resetBtn2');
        const status1 = document.getElementById('status1');
        const status2 = document.getElementById('status2');
        const player1Label = document.getElementById('player1Label');
        const player2Label = document.getElementById('player2Label');

        const playerInput = document.getElementById('playerInput');
        const playerLoadBtn = document.getElementById('playerLoadBtn');
        const playerIframe = document.getElementById('playerIframe');
        const playerPlaceholder = document.getElementById('playerPlaceholder');
        const playerPlaceholderMsg = document.getElementById('playerPlaceholderMsg');

        const colorBtns = document.querySelectorAll('#colorPicker .color-btn');

        // VHS OVERLAY
        const vhsOverlay = document.getElementById('vhsOverlay');
        const vhsExit = document.getElementById('vhsExit');
        const vhsMessage = document.getElementById('vhsMessage');

        // ============================================================
        // FUNCIONES DE AUDIO
        // ============================================================
        function playLogoPress() {
            try { logoPressAudio.currentTime = 0; logoPressAudio.volume = 0.8; logoPressAudio.loop = true; logoPressAudio.play().catch(() => {}); } catch(e) {}
        }
        function stopLogoPress() {
            try { logoPressAudio.pause(); logoPressAudio.currentTime = 0; logoPressAudio.loop = false; } catch(e) {}
        }
        function playShh() {
            try { shhAudio.currentTime = 0; shhAudio.volume = 0.8; shhAudio.play().catch(() => {}); } catch(e) {}
        }
        function playOof() {
            try { oofAudio.currentTime = 0; oofAudio.volume = 0.8; oofAudio.play().catch(() => {}); } catch(e) {}
        }
        function playUnder() {
            try { underAudio.currentTime = 0; underAudio.volume = 0.8; underAudio.play().catch(() => {}); } catch(e) {}
        }
        function playRandomExclamation() {
            const audios = [ayNoAudio, ayAudio, nooAudio, wthbAudio];
            const audio = audios[Math.floor(Math.random() * audios.length)];
            try { audio.currentTime = 0; audio.volume = 0.8; audio.play().catch(() => {}); } catch(e) {}
        }
        function playXDD() {
            try { xddAudio.currentTime = 0; xddAudio.volume = 0.9; xddAudio.play().catch(() => {}); } catch(e) {}
        }
        function playGameOverMusic() {
            try { if (isMusicPlaying) return; gameOverAudio.currentTime = 0; gameOverAudio.volume = 1.0; gameOverAudio.play().then(() => { isMusicPlaying = true; }).catch(() => {}); } catch(e) {}
        }
        function playWinMusic() {
            try { if (isMusicPlaying) return; winAudio.currentTime = 0; winAudio.volume = 1.0; winAudio.play().then(() => { isMusicPlaying = true; }).catch(() => {}); } catch(e) {}
        }
        function stopGameOverMusic() {
            try { if (!gameOverAudio.paused) gameOverAudio.pause(); if (!winAudio.paused) winAudio.pause(); gameOverAudio.currentTime = 0; winAudio.currentTime = 0; isMusicPlaying = false; } catch(e) {}
        }

        function shakeScreen() {
            document.body.classList.remove('shaking');
            void document.body.offsetWidth;
            document.body.classList.add('shaking');
            setTimeout(() => { document.body.classList.remove('shaking'); }, 500);
        }

        // ============================================================
        // UI CORAZONES
        // ============================================================
        function getHeartEmoji(alive, isLaughMode) {
            if (isLaughMode) {
                return alive ? '🤣' : '😂';
            }
            return alive ? '❤️' : '💔';
        }

        function updateSinglePlayerUI() {
            const isLaughMode = logoState === 1;
            heartElements.forEach((el, index) => {
                const alive = hearts[index];
                el.textContent = getHeartEmoji(alive, isLaughMode);
                el.style.color = heartColor;
                if (alive) {
                    el.classList.remove('lost', 'breaking');
                    el.style.textShadow = `0 8px 25px ${heartColor}88`;
                    el.style.filter = `drop-shadow(0 8px 12px #00000077)`;
                    el.style.opacity = '1';
                } else {
                    el.classList.add('lost');
                    el.style.textShadow = `0 0 20px ${heartColor}44`;
                    el.style.filter = `drop-shadow(0 0 15px ${heartColor}33)`;
                    el.style.opacity = '0.4';
                }
            });

            const aliveCount = hearts.filter(h => h).length;
            if (logoState === 1) {
                playerLabel.textContent = '👤 TÚ 🤣';
            } else {
                playerLabel.textContent = '👤 TÚ';
            }

            if (aliveCount === 0) {
                resetBtn.classList.add('visible');
            } else {
                resetBtn.classList.remove('visible');
            }
        }

        function updatePlayerUI(playerId) {
            const player = players[playerId];
            const hearts = playerId === 1 ? hearts1 : hearts2;
            const status = playerId === 1 ? status1 : status2;
            const isLaughMode = logoState === 1;

            hearts.forEach((el, index) => {
                const alive = player.hearts[index];
                el.textContent = getHeartEmoji(alive, isLaughMode);
                el.style.color = player.color;
                if (alive) {
                    el.classList.remove('lost', 'breaking');
                    el.style.textShadow = `0 8px 25px ${player.color}88`;
                    el.style.filter = `drop-shadow(0 8px 12px #00000077)`;
                    el.style.opacity = '1';
                } else {
                    el.classList.add('lost');
                    el.style.textShadow = `0 0 20px ${player.color}44`;
                    el.style.filter = `drop-shadow(0 0 15px ${player.color}33)`;
                    el.style.opacity = '0.4';
                }
            });

            const aliveCount = player.hearts.filter(h => h).length;
            const label = playerId === 1 ? player1Label : player2Label;
            if (logoState === 1) {
                label.textContent = `👤 JUGADOR ${playerId} 🤣`;
            } else {
                label.textContent = `👤 JUGADOR ${playerId}`;
            }

            if (aliveCount === 0) {
                if (logoState === 1) {
                    status.textContent = '😂¡PERDISTE! AJAJAJA';
                    status.className = 'player-status win';
                } else {
                    status.textContent = '💀 ¡Has perdido!';
                    status.className = 'player-status';
                }
            } else {
                status.textContent = `${'❤️'.repeat(aliveCount)} ${aliveCount} corazones`;
                status.className = 'player-status';
            }

            const resetBtn = playerId === 1 ? resetBtn1 : resetBtn2;
            if (aliveCount === 0) {
                resetBtn.classList.add('visible');
            } else {
                resetBtn.classList.remove('visible');
            }
        }

        function updateAllPlayers() {
            updatePlayerUI(1);
            updatePlayerUI(2);
        }

        // ============================================================
        // CLICK EN CORAZÓN (ÚNICO)
        // ============================================================
        function handleSingleHeartClick(e) {
            if (isGameOver || isMultiplayer) return;
            const el = e.currentTarget;
            const index = parseInt(el.dataset.index);
            if (!hearts[index]) return;

            hearts[index] = false;
            updateSinglePlayerUI();
            shakeScreen();
            playUnder();

            const aliveCount = hearts.filter(h => h).length;
            if (aliveCount === 1) {
                playRandomExclamation();
            }
            if (aliveCount === 0) {
                playOof();
                isGameOver = true;
                stopLogoPress();
                logoContainer.classList.remove('shaking-loop');
                setTimeout(() => { playGameOverMusic(); }, 300);
                setTimeout(() => {
                    gameOverOverlay.classList.add('show');
                    document.body.classList.add('game-over-active');
                    mainContainer.classList.add('game-over-mode');
                    goText.textContent = 'GAME OVER';
                    goSubText.textContent = '💀 Has perdido todos tus corazones';
                    goSubText.classList.remove('shaking-text');
                }, 600);
            }
        }

        // ============================================================
        // CLICK EN CORAZÓN (2P)
        // ============================================================
        function handlePlayerHeartClick(e) {
            if (isGameOver || !isMultiplayer) return;
            const el = e.currentTarget;
            const playerId = parseInt(el.dataset.player);
            const index = parseInt(el.dataset.index);
            const player = players[playerId];

            if (!player.hearts[index]) return;

            player.hearts[index] = false;
            updatePlayerUI(playerId);
            shakeScreen();
            playUnder();

            const aliveCount = player.hearts.filter(h => h).length;
            if (aliveCount === 1) {
                playRandomExclamation();
            }

            if (!url) {

                playerIframe.style.display = 'none';
                return;
            }

            let videoId = null;
            let match = url.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&?]+)/);
            if (match) videoId = match[1];
            match = url.match(/youtube\.com\/embed\/([^&?]+)/);
            if (match) videoId = match[1];

                playerIframe.style.display = 'none';

        function initVHS() {
            if (vhsInitialized) return;
            vhsInitialized = true;

            const canvas = document.getElementById('vhsCanvas');

            // Escena
            vhsScene = new THREE.Scene();
            vhsScene.background = new THREE.Color(0x000000);
            vhsScene.fog = new THREE.Fog(0x000000, 10, 30);

            // Cámara
            vhsCamera = new THREE.PerspectiveCamera(70, canvas.clientWidth / canvas.clientHeight, 0.1, 100);
            vhsCamera.position.set(0, 1.7, 5);

            // Renderer

            vhsRenderer.setSize(canvas.clientWidth, canvas.clientHeight);
            vhsRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            vhsRenderer.shadowMap.enabled = true;
            vhsRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
            vhsRenderer.toneMapping = THREE.ACESFilmicToneMapping;

            // Luces

            const pointLight2 = new THREE.PointLight(0x4466ff, 0.5, 10);
            pointLight2.position.set(-3, 2, -1);
            vhsScene.add(pointLight2);

            const pointLight3 = new THREE.PointLight(0x4422aa, 0.3, 8);
            pointLight3.position.set(3, 1, -2);
            vhsScene.add(pointLight3);

            const tvLight = new THREE.PointLight(0x8888ff, 0.5, 8);
            tvLight.position.set(0, 1.5, 0);
            vhsScene.add(tvLight);

            // Suelo
            const floorGeometry = new THREE.PlaneGeometry(20, 20);
            const floorMaterial = new THREE.MeshStandardMaterial({
                color: 0x0a0a0a,
                roughness: 0.9,
                metalness: 0.1,
                side: THREE.DoubleSide
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -0.5;
            floor.receiveShadow = true;
            vhsScene.add(floor);

            // Paredes
            function createWallVHS(width, height, posX, posY, posZ, rotY = 0) {
                const geo = new THREE.PlaneGeometry(width, height);
                const mat = new THREE.MeshStandardMaterial({
                    color: 0x0a0a12,
                    roughness: 0.8,
                    metalness: 0.2,
                    side: THREE.DoubleSide
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(posX, posY, posZ);
                mesh.rotation.y = rotY;
                mesh.receiveShadow = true;
                vhsScene.add(mesh);
                return mesh;
            }
            createWallVHS(12, 4, 0, 1.5, -6, 0);
            createWallVHS(12, 4, 0, 1.5, 6, Math.PI);
            createWallVHS(12, 4, -6, 1.5, 0, Math.PI / 2);
            createWallVHS(12, 4, 6, 1.5, 0, -Math.PI / 2);

            // Televisión
            const tvGroup = new THREE.Group();
            tvGroup.position.set(0, 1.2, -2.5);

            const tvBodyGeo = new THREE.BoxGeometry(2.2, 1.8, 0.6);
            const tvBodyMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a2a,
                roughness: 0.6,
                metalness: 0.4,

            });
            const tvBody = new THREE.Mesh(tvBodyGeo, tvBodyMat);
            tvBody.position.z = 0;
            tvBody.castShadow = true;
            tvGroup.add(tvBody);

            const screenGeo = new THREE.PlaneGeometry(1.8, 1.35);
            const screenMat = new THREE.MeshStandardMaterial({
                color: 0x0a0a1a,
                emissive: 0x111133,
                emissiveIntensity: 0.2,
                roughness: 0.3,
                metalness: 0.1
            });
            const screen = new THREE.Mesh(screenGeo, screenMat);
            screen.position.set(0, 0.05, 0.31);
            tvGroup.add(screen);

            const frameMat = new THREE.MeshStandardMaterial({ color: 0x222244, roughness: 0.5, metalness: 0.3 });
            const frameGeo = new THREE.BoxGeometry(1.85, 0.04, 0.05);
            const frameTop = new THREE.Mesh(frameGeo, frameMat);
            frameTop.position.set(0, 0.68, 0.31);
            tvGroup.add(frameTop);
            const frameBottom = new THREE.Mesh(frameGeo, frameMat);
            frameBottom.position.set(0, -0.68, 0.31);
            tvGroup.add(frameBottom);
            const frameLeft = new THREE.Mesh(new THREE.BoxGeometry(0.04, 1.35, 0.05), frameMat);
            frameLeft.position.set(-0.91, 0.05, 0.31);
            tvGroup.add(frameLeft);
            const frameRight = new THREE.Mesh(new THREE.BoxGeometry(0.04, 1.35, 0.05), frameMat);
            frameRight.position.set(0.91, 0.05, 0.31);
            tvGroup.add(frameRight);

            const powerBtnGeo = new THREE.SphereGeometry(0.05, 8, 8);
            const powerBtnMat = new THREE.MeshStandardMaterial({
                color: 0x44ff44,
                emissive: 0x44ff44,

            });
            const powerBtn = new THREE.Mesh(powerBtnGeo, powerBtnMat);
            powerBtn.position.set(0.5, -0.5, 0.35);
            tvGroup.add(powerBtn);

            const baseGeo = new THREE.BoxGeometry(1.2, 0.1, 0.4);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.8 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.set(0, -0.95, 0);
            tvGroup.add(base);

            const legMat = new THREE.MeshStandardMaterial({ color: 0x222244, metalness: 0.5, roughness: 0.3 });
            const legPositions = [[-0.4, -1.0, 0.2], [0.4, -1.0, 0.2], [-0.4, -1.0, -0.2], [0.4, -1.0, -0.2]];
            legPositions.forEach(pos => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.05, 0.1, 6), legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                tvGroup.add(leg);

            vhsScene.add(tvGroup);
            const tvScreen = screen;

            // Sistema de video de la TV
            let vhsVideoElement = null;
            let vhsVideoTexture = null;

            function createVideoElement(src, loop = true) {
                const video = document.createElement('video');
                video.src = src;
                video.crossOrigin = 'anonymous';
                video.playsInline = true;
                video.muted = false;
                video.loop = loop;
                video.volume = 0.5;
                return video;
            }

            function setTVScreen(video) {
                if (vhsVideoTexture) {
                    vhsVideoTexture.dispose();
                }
                vhsVideoTexture = new THREE.VideoTexture(video);
                vhsVideoTexture.minFilter = THREE.LinearFilter;
                vhsVideoTexture.magFilter = THREE.LinearFilter;

                tvScreen.material = new THREE.MeshStandardMaterial({
                    map: vhsVideoTexture,
                    emissive: new THREE.Color(0x4488ff),
                    emissiveIntensity: 0.3,
                    roughness: 0.2,
                    metalness: 0.1,
                    side: THREE.DoubleSide
                });

                tvLight.intensity = 1.5;
            }

                if (vhsVideoElement) {
                    vhsVideoElement.pause();
                    vhsVideoElement.currentTime = 0;
                    vhsVideoElement = null;
                }
                vhsVideoElement = createVideoElement('Screen.mp4', true);
                setTVScreen(vhsVideoElement);
                vhsVideoElement.play().catch(() => {});
            }

            function playNoIn() {
                if (vhsVideoElement) {
                    vhsVideoElement.pause();
                    vhsVideoElement.currentTime = 0;
                    vhsVideoElement = null;
                }
                vhsVideoElement = createVideoElement('NoIn.mp4', false);
                setTVScreen(vhsVideoElement);
                vhsVideoElement.addEventListener('ended', function onEnd() {
                    vhsVideoElement.removeEventListener('ended', onEnd);

                vhsVideoElement.play().catch(() => { playScreenLoop(); });

            function playTutorial() {
                if (vhsVideoElement) {
                    vhsVideoElement.pause();
                    vhsVideoElement.currentTime = 0;
                    vhsVideoElement = null;
                }
                vhsVideoElement = createVideoElement('Tutoriall.mp4', false);
                setTVScreen(vhsVideoElement);

                    vhsVideoElement.removeEventListener('ended', onEnd);
                    playScreenLoop();
                    vhsIsWatching = false;
                    document.getElementById('vhsCrosshair').style.display = 'block';
                });
                vhsVideoElement.play().catch(() => { playScreenLoop(); });
            }

            setTimeout(() => { playScreenLoop(); }, 500);

            // ============================================================
            // CINTA VHS (modelo GLB o fallback)
            // ============================================================
            const textureLoader = new THREE.TextureLoader();
            const vhsTexture = textureLoader.load('VHS.png');

            vhsTapeGroup.position.set(1.5, 0.1, -1.5);

            // Fallback: crear una cinta simple
            function createFallbackVHS() {
                const tapeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2a, roughness: 0.7, metalness: 0.2 });
                const tapeBody = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.25, 0.6), tapeMat);
                tapeBody.castShadow = true;
                vhsTapeGroup.add(tapeBody);

                const labelMat = new THREE.MeshStandardMaterial({ 
                    map: vhsTexture,
                    roughness: 0.5,
                    metalness: 0.2,
                    side: THREE.DoubleSide
                });
                const label = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.15), labelMat);
                label.position.set(0, 0.13, 0.31);
                vhsTapeGroup.add(label);

                vhsScene.add(vhsTapeGroup);

                // Copia para la mano
                const handBody = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.25, 0.6), tapeMat);
                handBody.castShadow = true;
                vhsHandTapeGroup.add(handBody);
                const handLabel = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.15), labelMat);
                handLabel.position.set(0, 0.13, 0.31);
                vhsHandTapeGroup.add(handLabel);
                vhsHandTapeGroup.scale.set(0.35, 0.35, 0.35);
                vhsHandTapeGroup.position.set(0.4, -0.3, -0.6);
                vhsHandTapeGroup.rotation.x = 0.2;
                vhsHandTapeGroup.rotation.z = -0.3;
                vhsHandTapeGroup.visible = false;
                vhsCamera.add(vhsHandTapeGroup);
                vhsScene.add(vhsCamera);
            }

            // Intentar cargar GLB
            const loader = new THREE.GLTFLoader();
            loader.load('vhs_tape.glb', function(gltf) {
                const model = gltf.scene;
                model.scale.set(0.7, 0.7, 0.7);
                model.position.y = 0;
                
                model.traverse(function(child) {
                    if (child.isMesh) {
                        if (child.name && (child.name.toLowerCase().includes('top') || 
                                           child.name.toLowerCase().includes('label') ||
                                           child.name.toLowerCase().includes('cover'))) {
                            const material = new THREE.MeshStandardMaterial({
                                map: vhsTexture,
                                roughness: 0.5,
                                metalness: 0.2,
                                side: THREE.DoubleSide
                            });
                            child.material = material;
                        } else {
                            if (child.material && !child.material.map) {
                                const mat = new THREE.MeshStandardMaterial({
                                    color: 0x1a1a2a,
                                    roughness: 0.7,
                                    metalness: 0.2
                                });
                                child.material = mat;
                            }
                        }
                    }
                });

                vhsTapeGroup.add(model);
                vhsScene.add(vhsTapeGroup);
                
                // Copia para la mano
                const handModel = model.clone();
                vhsHandTapeGroup.add(handModel);
                vhsHandTapeGroup.scale.set(0.35, 0.35, 0.35);
                vhsHandTapeGroup.position.set(0.4, -0.3, -0.6);
                vhsHandTapeGroup.rotation.x = 0.2;
                vhsHandTapeGroup.rotation.z = -0.3;
                vhsHandTapeGroup.visible = false;
                vhsCamera.add(vhsHandTapeGroup);
                vhsScene.add(vhsCamera);

                console.log('📼 Modelo VHS cargado');
            }, undefined, function() {
                console.log('📼 Usando fallback VHS');
                createFallbackVHS();
            });

            // ============================================================
            // CONTROLES
            // ============================================================
            document.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (vhsOverlay.classList.contains('active')) {
                    if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                        vhsKeys[key] = true;
                        e.preventDefault();
                    }
                    if (e.key === 'Escape' && vhsIsWatching) {
                        vhsIsWatching = false;
                        document.getElementById('vhsCrosshair').style.display = 'block';
                        if (vhsVideoElement) {
                            vhsVideoElement.pause();
                            vhsVideoElement.currentTime = 0;
                            vhsVideoElement = null;
                        }
                        playScreenLoop();
                        if (vhsHasVHS) {
                            vhsHandTapeGroup.visible = true;
                        }
                    }
                }
            });

            document.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                    vhsKeys[key] = false;
                    e.preventDefault();
                }
            });

            // Mouse lock
            vhsRenderer.domElement.addEventListener('click', () => {
                if (!vhsIsLocked && !vhsIsWatching && vhsOverlay.classList.contains('active')) {
                    vhsRenderer.domElement.requestPointerLock();
                }
            });

            document.addEventListener('pointerlockchange', () => {
                vhsIsLocked = document.pointerLockElement === vhsRenderer.domElement;
            });

            document.addEventListener('mousemove', (e) => {
                if (vhsIsLocked && !vhsIsWatching && vhsOverlay.classList.contains('active')) {
                    vhsMouseX += e.movementX * 0.002;
                    vhsMouseY -= e.movementY * 0.002;
                    vhsMouseY = Math.max(-0.8, Math.min(0.8, vhsMouseY));
                }
            });

            // Raycaster
            const raycaster = new THREE.Raycaster();
            const pointer = new THREE.Vector2();

            vhsRenderer.domElement.addEventListener('click', (e) => {
                if (vhsIsWatching) return;

                const rect = vhsRenderer.domElement.getBoundingClientRect();
                pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

                raycaster.setFromCamera(pointer, vhsCamera);

                if (vhsTapeGroup.parent) {
                    const vhsIntersects = raycaster.intersectObject(vhsTapeGroup, true);
                    if (vhsIntersects.length > 0 && !vhsHasVHS) {
                        vhsHasVHS = true;
                        vhsScene.remove(vhsTapeGroup);
                        vhsHandTapeGroup.visible = true;
                        showVHSMessage('📼 Cinta VHS recogida');
                        return;
                    }
                }

                const tvIntersects = raycaster.intersectObject(tvGroup, true);
                if (tvIntersects.length > 0) {
                    if (vhsHasVHS) {
                        showVHSMessage('📺 Reproduciendo...');
                        playTutorial();
                        vhsIsWatching = true;
                        document.getElementById('vhsCrosshair').style.display = 'none';
                        vhsHandTapeGroup.visible = false;
                    } else {
                        showVHSMessage('📺 Sin cinta');
                        playNoIn();
                    }
                    return;
                }
            });

            // Animación
            let vhsStartTime = Date.now();

            function animateVHS() {
                if (!vhsOverlay.classList.contains('active')) {
                    requestAnimationFrame(animateVHS);
                    return;
                }

                requestAnimationFrame(animateVHS);

                const now = Date.now();
                const delta = Math.min((now - vhsStartTime) / 16.67, 3);
                vhsStartTime = now;

                if (!vhsIsWatching) {
                    if (vhsIsLocked) {
                        vhsPlayerRot += vhsMouseX * 0.5;
                        vhsMouseX = 0;
                        vhsTargetPitch = vhsMouseY * 0.6;
                    }

                    vhsPitch += (vhsTargetPitch - vhsPitch) * 0.12;

                    const forward = new THREE.Vector3(-Math.sin(vhsPlayerRot), 0, -Math.cos(vhsPlayerRot));
                    const right = new THREE.Vector3(Math.cos(vhsPlayerRot), 0, -Math.sin(vhsPlayerRot));

                    const moveVec = new THREE.Vector3(0, 0, 0);
                    if (vhsKeys.w) moveVec.add(forward);
                    if (vhsKeys.s) moveVec.sub(forward);
                    if (vhsKeys.a) moveVec.sub(right);
                    if (vhsKeys.d) moveVec.add(right);

                    if (moveVec.length() > 0) {
                        moveVec.normalize().multiplyScalar(0.06 * delta);
                        vhsPlayerPos.add(moveVec);
                        vhsPlayerPos.x = Math.max(-4.5, Math.min(4.5, vhsPlayerPos.x));
                        vhsPlayerPos.z = Math.max(-4.5, Math.min(4.5, vhsPlayerPos.z));
                    }

                    vhsCamera.position.copy(vhsPlayerPos);
                    vhsCamera.position.y = 1.7;

                    const euler = new THREE.Euler(vhsPitch, vhsPlayerRot, 0, 'YXZ');
                    vhsCamera.quaternion.setFromEuler(euler);

                    if (vhsHandTapeGroup.visible) {
                        vhsHandTapeGroup.position.x = 0.4 + Math.sin(now / 800) * 0.02;
                        vhsHandTapeGroup.position.y = -0.3 + Math.sin(now / 600) * 0.01;
                        vhsHandTapeGroup.rotation.z = -0.3 + Math.sin(now / 700) * 0.02;
                    }
                } else {
                    vhsCamera.position.set(0, 1.3, -0.5);
                    vhsCamera.lookAt(0, 0.8, -2.5);
                }

                if (!vhsHasVHS && vhsTapeGroup.parent) {
                    vhsTapeGroup.rotation.y += 0.005;
                    vhsTapeGroup.position.y = 0.1 + Math.sin(now / 1000) * 0.02;
                }

                vhsRenderer.render(vhsScene, vhsCamera);
            }

            // Redimensionar
            function resizeVHS() {
                const canvas = document.getElementById('vhsCanvas');
                const w = canvas.clientWidth;
                const h = canvas.clientHeight;
                if (vhsCamera) {
                    vhsCamera.aspect = w / h;
                    vhsCamera.updateProjectionMatrix();
                }
                if (vhsRenderer) {
                    vhsRenderer.setSize(w, h);
                }
            }

            window.addEventListener('resize', resizeVHS);
            animateVHS();
            window.vhsResize = resizeVHS;
        }

        // ============================================================
        // ABRIR/CERRAR VHS
        // ============================================================
        function openVHS() {
            if (!vhsInitialized) {
                initVHS();
            }
            vhsOverlay.classList.add('active');
            if (window.vhsResize) setTimeout(window.vhsResize, 100);
            setTimeout(() => {
                if (!vhsIsLocked && !vhsIsWatching) {
                    vhsRenderer.domElement.requestPointerLock();
                }
            }, 500);
        }

        function closeVHS() {
            vhsOverlay.classList.remove('active');
            document.exitPointerLock();
            vhsIsLocked = false;
            vhsPlayerPos.set(0, 1.7, 5);
            vhsPlayerRot = 0;
            vhsPitch = 0;
            vhsTargetPitch = 0;
            if (vhsCamera) {
                vhsCamera.position.set(0, 1.7, 5);
                const euler = new THREE.Euler(0, 0, 0, 'YXZ');
                vhsCamera.quaternion.setFromEuler(euler);
            }
            if (vhsIsWatching) {
                vhsIsWatching = false;
                document.getElementById('vhsCrosshair').style.display = 'block';
                if (vhsVideoElement) {
                    vhsVideoElement.pause();
                    vhsVideoElement.currentTime = 0;
                    vhsVideoElement = null;
                }
                // playScreenLoop();
            }
        }

        vhsExit.addEventListener('click', closeVHS);

        // ============================================================
        // BOTÓN CÓMO JUGAR - ABRE VHS
        // ============================================================
        howToPlayBtn.addEventListener('click', function() {
            openVHS();
        });

        // ============================================================
        // INICIALIZAR EVENTOS DE CORAZONES
        // ============================================================
        function initHeartEvents() {
            heartElements.forEach(el => {
                el.removeEventListener('click', handleSingleHeartClick);
                el.addEventListener('click', handleSingleHeartClick);
            });

            hearts1.forEach(el => {
                el.removeEventListener('click', handlePlayerHeartClick);
                el.addEventListener('click', handlePlayerHeartClick);
            });
            hearts2.forEach(el => {
                el.removeEventListener('click', handlePlayerHeartClick);
                el.addEventListener('click', handlePlayerHeartClick);
            });
        }

        // ============================================================
        // INICIALIZAR
        // ============================================================
        function init() {
            initHeartEvents();
            updateSinglePlayerUI();
            updateAllPlayers();
            updateAllTexts();

            console.log('❤️ NoTeRias · Corazones + VHS 3D');
            console.log('📁 Archivos necesarios: vhs_tape.glb, VHS.png, Screen.mp4, NoIn.mp4, Tutoriall.mp4, Log0.png');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        window.resetGame = function() {
            goResetBtn.click();
        };
    })();
</script>
</body>
</html>
