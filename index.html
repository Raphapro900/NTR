<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoTeRias · Corazones</title>
    <link rel="icon" type="image/png" href="Log0.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Komika Axis', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            margin: 0;
            padding: 20px;
            transition: transform 0.05s, filter 0.05s;
            overflow-x: hidden;
        }
        body.shaking {
            animation: shakeWithBlur 0.5s ease-in-out;
        }
        @keyframes shakeWithBlur {
            0%, 100% { transform: translate(0,0) rotate(0deg); filter: blur(0px); }
            10% { transform: translate(-12px,8px) rotate(-2deg); filter: blur(3px); }
            20% { transform: translate(12px,-8px) rotate(2deg); filter: blur(4px); }
            30% { transform: translate(-8px,12px) rotate(-1.5deg); filter: blur(3px); }
            40% { transform: translate(8px,-12px) rotate(1.5deg); filter: blur(4px); }
            50% { transform: translate(-12px,6px) rotate(-2deg); filter: blur(5px); }
            60% { transform: translate(12px,-6px) rotate(2deg); filter: blur(4px); }
            70% { transform: translate(-6px,10px) rotate(-1deg); filter: blur(3px); }
            80% { transform: translate(6px,-10px) rotate(1deg); filter: blur(3px); }
            90% { transform: translate(-8px,4px) rotate(-0.5deg); filter: blur(2px); }
            100% { transform: translate(0,0) rotate(0deg); filter: blur(0px); }
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            width: 100%;
            max-width: 750px;
            transition: opacity 0.5s ease, filter 0.5s ease;
        }
        .main-container.game-over-mode {
            opacity: 0.1;
            filter: blur(8px);
            pointer-events: none;
        }

        /* === LOGO CON ANIMACIÓN RÁPIDA Y FUERTE === */
        .logo-container {
            width: 100%;
            text-align: center;
            padding: 0.3rem 0;
            margin-bottom: -0.3rem;
            cursor: pointer;
            position: relative;
        }
        .logo-container.shaking-logo {
            animation: logoShakeStrong 0.4s ease-in-out 3;
        }
        @keyframes logoShakeStrong {
            0%, 100% { transform: translate(0,0) rotate(0deg); filter: blur(0px); }
            10% { transform: translate(-14px,10px) rotate(-3deg); filter: blur(4px); }
            20% { transform: translate(14px,-10px) rotate(3deg); filter: blur(5px); }
            30% { transform: translate(-10px,14px) rotate(-2.5deg); filter: blur(4px); }
            40% { transform: translate(10px,-14px) rotate(2.5deg); filter: blur(5px); }
            50% { transform: translate(-14px,8px) rotate(-3deg); filter: blur(6px); }
            60% { transform: translate(14px,-8px) rotate(3deg); filter: blur(5px); }
            70% { transform: translate(-8px,12px) rotate(-2deg); filter: blur(4px); }
            80% { transform: translate(8px,-12px) rotate(2deg); filter: blur(4px); }
            90% { transform: translate(-10px,6px) rotate(-1.5deg); filter: blur(3px); }
            100% { transform: translate(0,0) rotate(0deg); filter: blur(0px); }
        }

        .logo-text {
            font-family: 'Komika Axis', 'Comic Sans MS', 'Chalkboard SE', cursive;
            font-size: 5rem;
            font-weight: bold;
            letter-spacing: 8px;
            background: linear-gradient(180deg, #ff6b7c 0%, #ff2b4f 40%, #cc0018 70%, #880010 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 8px 25px rgba(255,43,79,0.4));
            position: relative;
            display: inline-block;
            transition: transform 0.15s ease, filter 0.3s ease;
        }
        .logo-text:hover {
            transform: scale(1.02);
        }
        .logo-text:active {
            transform: scale(0.95);
        }
        .logo-text::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 10%;
            width: 80%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #ff2b4f, #ff6b7c, #ff2b4f, transparent);
            border-radius: 2px;
            filter: blur(1px);
            transition: all 0.3s ease;
        }
        .logo-text.switched::after {
            background: linear-gradient(90deg, transparent, #ff6b7c, #ff2b4f, #ff6b7c, transparent);
            width: 60%;
        }

        .logo-sub {
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            font-size: 1rem;
            color: #ff6b7c88;
            letter-spacing: 10px;
            margin-top: 0.2rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .logo-sub.switched {
            color: #ff6b7c44;
            letter-spacing: 4px;
        }

        .credits {
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            font-size: 0.8rem;
            color: #ff6b7c44;
            letter-spacing: 2px;
            text-align: center;
            margin-top: -0.3rem;
            padding: 0.2rem 0;
            border-top: 1px solid #ff6b7c22;
            width: 100%;
            max-width: 400px;
        }
        .credits span { color: #ff6b7c66; }

        .heart-counter {
            background: rgba(26,26,46,0.85);
            backdrop-filter: blur(6px);
            border-radius: 3rem;
            padding: 1.5rem 2.5rem 1.2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 3px #ff3b5c55 inset;
            text-align: center;
            width: 100%;
            border: 2px solid #ff6b7c66;
            position: relative;
        }
        .heart-counter .player-label {
            font-size: 1rem;
            color: #ff6b7caa;
            letter-spacing: 4px;
            margin-bottom: 0.2rem;
            text-transform: uppercase;
        }
        .hearts-container {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 0.2rem 0 0.3rem 0;
            flex-wrap: wrap;
        }
        .heart {
            font-size: 5rem;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.15s ease, filter 0.2s, opacity 0.2s;
            text-shadow: 0 8px 25px rgba(255,50,80,0.7);
            color: #ff2b4f;
            filter: drop-shadow(0 8px 12px #00000077);
            transform: scale(1);
            position: relative;
        }
        .heart:hover {
            transform: scale(1.12);
            filter: drop-shadow(0 0 22px #ff3b5c);
        }
        .heart:active {
            transform: scale(0.85);
        }
        .heart.lost {
            color: #ff2b4f;
            text-shadow: 0 0 20px #ff2b4f66;
            filter: drop-shadow(0 0 15px #ff2b4f44);
            cursor: default;
            transform: scale(0.92);
            pointer-events: none;
            opacity: 0.5;
        }
        .heart.breaking {
            animation: breakHeart 1.2s ease-out forwards;
            pointer-events: none !important;
        }
        @keyframes breakHeart {
            0% { transform: scale(1) rotate(0deg); opacity: 1; color: #ff2b4f; text-shadow: 0 0 30px #ff2b4f; }
            25% { transform: scale(1.4) rotate(-15deg); color: #ff4455; text-shadow: 0 0 60px #ff2b4f; }
            50% { transform: scale(1.6) rotate(10deg) translateY(-20px); color: #ff0020; text-shadow: 0 0 80px #ff0020; }
            75% { transform: scale(1.8) rotate(-5deg) translateY(-40px); color: #cc0018; text-shadow: 0 0 100px #cc0018; opacity: 0.8; }
            100% { transform: scale(2.5) rotate(20deg) translateY(-80px); color: #880010; text-shadow: 0 0 120px #880010; opacity: 0; }
        }

        .reset-btn {
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            background: #ff3b5c;
            border: none;
            color: #1a1a2e;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 0.6rem 1.8rem;
            margin-top: 0.3rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #881a2a, 0 12px 30px #000000aa;
            transition: all 0.08s linear;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 2px solid #ff9eae;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            display: none;
        }
        .reset-btn.visible { display: block; }
        .reset-btn:hover {
            background: #ff4f6e;
            transform: scale(1.03);
            box-shadow: 0 6px 0 #881a2a, 0 15px 35px #000000dd;
        }
        .reset-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #881a2a, 0 8px 25px #000;
        }

        .youtube-search {
            width: 100%;
            background: rgba(26,26,46,0.8);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            border: 2px solid #ff6b7c44;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        .youtube-search.hidden {
            opacity: 0;
            pointer-events: none;
            height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
            border: none;
        }
        .youtube-search .search-icon { font-size: 1.4rem; color: #ff6b7c88; flex-shrink: 0; }
        .youtube-search input {
            flex: 1;
            min-width: 180px;
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            border: 2px solid #ff6b7c33;
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Segoe UI', Arial, sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }
        .youtube-search input::placeholder { color: #8888aa; }
        .youtube-search input:focus {
            border-color: #ff3b5c;
            background: rgba(255,255,255,0.10);
            box-shadow: 0 0 30px #ff3b5c22;
        }
        .youtube-search button {
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            border: none;
            background: linear-gradient(135deg, #ff3b5c, #dd0028);
            color: #1a1a2e;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 0 #881a2a, 0 8px 25px rgba(255,43,79,0.25);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .youtube-search button:hover {
            background: linear-gradient(135deg, #ff4f6e, #ee0038);
            transform: scale(1.02);
        }
        .youtube-search button:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #881a2a;
        }

        .youtube-results {
            width: 100%;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.22, 0.61, 0.36, 1), 
                        opacity 0.4s ease, 
                        padding 0.4s ease;
            opacity: 0;
            background: rgba(26,26,46,0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 0 1.5rem;
            border: 2px solid transparent;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        .youtube-results.active {
            max-height: 750px;
            opacity: 1;
            padding: 1.8rem 1.8rem 1.5rem;
            border-color: #ff6b7c55;
            overflow-y: auto;
        }
        .youtube-results iframe {
            width: 100%;
            height: 350px;
            border-radius: 1.2rem;
            border: 2px solid #ff6b7c33;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            transition: border-color 0.3s ease;
            background: #0a0a1a;
        }
        .youtube-results iframe:hover {
            border-color: #ff6b7c77;
        }
        .youtube-results .video-info {
            margin-top: 0.8rem;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.04);
            border-radius: 1rem;
            border: 1px solid #ff6b7c22;
            text-align: center;
        }
        .youtube-results .video-title {
            color: #ffb3b3;
            font-size: 1.05rem;
            font-weight: bold;
            word-break: break-word;
            font-family: 'Segoe UI', Arial, sans-serif;
            letter-spacing: 0.3px;
            text-shadow: 0 0 20px rgba(255,50,80,0.1);
        }
        .youtube-results .video-creator {
            color: #ff6b7c88;
            font-size: 0.9rem;
            margin-top: 0.2rem;
            font-family: 'Segoe UI', Arial, sans-serif;
            letter-spacing: 0.5px;
        }
        .youtube-results .video-creator span {
            color: #ff6b7cbb;
        }
        .youtube-results .close-btn {
            position: absolute;
            top: 0.6rem;
            right: 0.6rem;
            background: #ff3b5c;
            border: none;
            color: #1a1a2e;
            font-size: 1.2rem;
            border-radius: 50%;
            width: 2.4rem;
            height: 2.4rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            z-index: 10;
            box-shadow: 0 2px 15px rgba(255,43,79,0.3);
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .youtube-results .close-btn:hover {
            transform: scale(1.1) rotate(90deg);
            background: #ff4f6e;
            box-shadow: 0 2px 25px rgba(255,43,79,0.5);
        }
        .youtube-results .close-btn:active {
            transform: scale(0.9);
        }

        .youtube-results::-webkit-scrollbar { width: 6px; }
        .youtube-results::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 10px; }
        .youtube-results::-webkit-scrollbar-thumb { background: #ff3b5c66; border-radius: 10px; }
        .youtube-results::-webkit-scrollbar-thumb:hover { background: #ff3b5c99; }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10000;
            animation: undertaleFadeIn 1.2s ease-out forwards;
            overflow: hidden;
        }
        .game-over-overlay.show { display: flex; }
        @keyframes undertaleFadeIn {
            0% { opacity: 0; background: #000000; }
            60% { opacity: 1; background: #0a0005; }
            100% { opacity: 1; background: #0a0005; }
        }
        .game-over-overlay .go-text {
            font-family: 'Komika Axis', 'Comic Sans MS', 'Chalkboard SE', cursive;
            font-size: 6rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 40px #ff2b4f, 0 0 80px #ff2b4f, 0 0 120px #ff2b4f;
            animation: goTextDrop 1.2s cubic-bezier(0.22,0.61,0.36,1) forwards;
            letter-spacing: 12px;
            transform: translateY(-200px);
            opacity: 0;
        }
        @keyframes goTextDrop {
            0% { transform: translateY(-200px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .game-over-overlay .go-text::after {
            content: '';
            display: block;
            width: 200px;
            height: 3px;
            margin: 10px auto 0;
            background: linear-gradient(90deg, transparent, #ff2b4f, transparent);
            animation: goLinePulse 2s ease-in-out infinite alternate;
        }
        @keyframes goLinePulse {
            0% { opacity: 0.3; width: 100px; }
            100% { opacity: 1; width: 300px; }
        }
        .game-over-overlay .go-sub {
            font-family: 'Komika Axis', 'Comic Sans MS', 'Chalkboard SE', cursive;
            font-size: 1.6rem;
            color: #ff8888;
            margin-top: 1.2rem;
            text-shadow: 0 0 30px #ff2b4f55;
            opacity: 0;
            animation: goSubFade 0.8s ease-out 0.6s forwards, goSubPulse 2s ease-in-out infinite alternate 0.5s;
        }
        @keyframes goSubFade { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes goSubPulse { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        .game-over-overlay .go-reset-btn {
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            background: #ff3b5c;
            border: none;
            color: #1a1a2e;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 0.9rem 2.8rem;
            margin-top: 2rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #881a2a, 0 12px 30px #000000aa;
            transition: all 0.08s linear;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 2px solid #ff9eae;
            transform: translateY(200px);
            opacity: 0;
            animation: goBtnRise 1s cubic-bezier(0.22,0.61,0.36,1) 0.4s forwards;
        }
        @keyframes goBtnRise {
            0% { transform: translateY(200px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .game-over-overlay .go-reset-btn:hover {
            background: #ff4f6e;
            transform: scale(1.05);
            box-shadow: 0 8px 0 #881a2a, 0 15px 35px #000000dd;
        }
        .game-over-overlay .go-reset-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #881a2a, 0 8px 25px #000;
        }
        body.game-over-active { overflow: hidden; }
        .youtube-search.hidden, .youtube-results.hidden { display: none !important; }

        @media (max-width: 600px) {
            .logo-text { font-size: 3.5rem; letter-spacing: 4px; }
            .logo-sub { font-size: 0.8rem; letter-spacing: 6px; }
            .heart { font-size: 3.8rem; }
            .hearts-container { gap: 1rem; }
            .heart-counter { padding: 1.2rem 1.5rem 1rem; }
            .reset-btn { font-size: 1.1rem; padding: 0.5rem 1.4rem; }
            .youtube-search { padding: 0.8rem 1rem; }
            .youtube-search input { min-width: 120px; font-size: 0.85rem; padding: 0.6rem 1rem; }
            .youtube-search button { font-size: 0.8rem; padding: 0.6rem 1.2rem; }
            .youtube-results iframe { height: 220px; }
            .youtube-results.active { padding: 1rem; }
            .youtube-results .video-title { font-size: 0.9rem; }
            .youtube-results .video-creator { font-size: 0.8rem; }
            .game-over-overlay .go-text { font-size: 3.5rem; letter-spacing: 6px; }
            .game-over-overlay .go-sub { font-size: 1.2rem; }
            .game-over-overlay .go-reset-btn { font-size: 1.3rem; padding: 0.6rem 1.8rem; }
            .credits { font-size: 0.7rem; }
        }
        @media (max-width: 400px) {
            .heart { font-size: 3rem; }
            .hearts-container { gap: 0.6rem; }
            .logo-text { font-size: 2.8rem; letter-spacing: 2px; }
            .youtube-results iframe { height: 170px; }
            .game-over-overlay .go-text { font-size: 2.8rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

<!-- GAME OVER OVERLAY -->
<div class="game-over-overlay" id="gameOverOverlay">
    <div class="go-text" id="goText">GAME OVER</div>
    <div class="go-sub" id="goSubText">❤️ Haz perdido todos tus corazones</div>
    <button class="go-reset-btn" id="goResetBtn">⟳ Volver a intentar</button>
</div>

<div class="main-container" id="mainContainer">
    <!-- LOGO CON ANIMACIÓN RÁPIDA Y FUERTE -->
    <div class="logo-container" id="logoContainer">
        <div class="logo-text" id="logoText">NoTeRias</div>
        <div class="logo-sub" id="logoSub">★ play & enjoy ★</div>
    </div>

    <div class="heart-counter" id="heartCounter">
        <div class="player-label" id="playerLabel">👤 TÚ</div>
        <div class="hearts-container" id="heartsContainer">
            <span class="heart" data-index="0">❤️</span>
            <span class="heart" data-index="1">❤️</span>
            <span class="heart" data-index="2">❤️</span>
        </div>
        <button id="resetBtn" class="reset-btn">⟳ Volver a intentar</button>
    </div>

    <div class="youtube-search" id="youtubeSearch">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Pega la URL de YouTube..." value="">
        <button id="searchBtn"><span class="btn-icon">▶</span> Cargar</button>
    </div>
    <div class="youtube-results" id="youtubeResults">
        <button class="close-btn" id="closeResults">✕</button>
        <div id="videoContainer"></div>
        <div class="video-info" id="videoInfo" style="display:none;">
            <div class="video-title" id="videoTitle">Título del video</div>
            <div class="video-creator" id="videoCreator">👤 <span id="creatorName">Creador</span></div>
        </div>
    </div>

    <div class="credits">
        <span>CC0</span> Raphapro900 <span>- V1.0</span>
    </div>
</div>

<!-- AUDIOS -->
<audio id="gameOverAudio" preload="auto"><source src="GameOver.mp3" type="audio/mpeg"></audio>
<audio id="winAudio" preload="auto"><source src="Win.mp3" type="audio/mpeg"></audio>
<audio id="underAudio" preload="auto"><source src="under.mp3" type="audio/mpeg"></audio>
<audio id="ayNoAudio" preload="auto"><source src="AyNo.mp3" type="audio/mpeg"></audio>
<audio id="ayAudio" preload="auto"><source src="Ay.mp3" type="audio/mpeg"></audio>
<audio id="nooAudio" preload="auto"><source src="Noo.mp3" type="audio/mpeg"></audio>
<audio id="wthbAudio" preload="auto"><source src="WTHB.mp3" type="audio/mpeg"></audio>
<audio id="logoPressAudio" preload="auto" loop><source src="LogoPress.mp3" type="audio/mpeg"></audio>
<audio id="shhAudio" preload="auto"><source src="Shh.mp3" type="audio/mpeg"></audio>

<script>
    (function() {
        // ============================================================
        // ESTADO DEL JUGADOR
        // ============================================================
        let hearts = [true, true, true];
        let isGameOver = false;
        let isMusicPlaying = false;
        let logoState = 0; // 0 = "NoTeRias", 1 = "Ríe"
        let isWin = false;

        // ============================================================
        // DOM ELEMENTS
        // ============================================================
        const heartElements = document.querySelectorAll('.heart');
        const resetBtn = document.getElementById('resetBtn');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const youtubeResults = document.getElementById('youtubeResults');
        const videoContainer = document.getElementById('videoContainer');
        const closeResultsBtn = document.getElementById('closeResults');
        const youtubeSearch = document.getElementById('youtubeSearch');
        const mainContainer = document.getElementById('mainContainer');
        const audioElement = document.getElementById('gameOverAudio');
        const winAudio = document.getElementById('winAudio');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const goResetBtn = document.getElementById('goResetBtn');
        const goText = document.getElementById('goText');
        const goSubText = document.getElementById('goSubText');
        const logoContainer = document.getElementById('logoContainer');
        const logoText = document.getElementById('logoText');
        const logoSub = document.getElementById('logoSub');
        const videoInfo = document.getElementById('videoInfo');
        const videoTitle = document.getElementById('videoTitle');
        const creatorName = document.getElementById('creatorName');

        // ============================================================
        // AUDIOS
        // ============================================================
        const underAudio = document.getElementById('underAudio');
        const ayNoAudio = document.getElementById('ayNoAudio');
        const ayAudio = document.getElementById('ayAudio');
        const nooAudio = document.getElementById('nooAudio');
        const wthbAudio = document.getElementById('wthbAudio');
        const logoPressAudio = document.getElementById('logoPressAudio');
        const shhAudio = document.getElementById('shhAudio');

        // ============================================================
        // FUNCIONES DE AUDIO
        // ============================================================
        function playLogoPress() {
            try {
                logoPressAudio.currentTime = 0;
                logoPressAudio.volume = 0.8;
                logoPressAudio.loop = true;
                logoPressAudio.play().catch(() => {});
            } catch(e) {}
        }

        function stopLogoPress() {
            try {
                logoPressAudio.pause();
                logoPressAudio.currentTime = 0;
                logoPressAudio.loop = false;
            } catch(e) {}
        }

        function playShh() {
            try {
                shhAudio.currentTime = 0;
                shhAudio.volume = 0.8;
                shhAudio.play().catch(() => {});
            } catch(e) {}
        }

        function playUnder() {
            try {
                underAudio.currentTime = 0;
                underAudio.volume = 0.8;
                underAudio.play().catch(() => {});
            } catch(e) {}
        }

        function playRandomExclamation() {
            const audios = [ayNoAudio, ayAudio, nooAudio, wthbAudio];
            const audio = audios[Math.floor(Math.random() * audios.length)];
            try {
                audio.currentTime = 0;
                audio.volume = 0.8;
                audio.play().catch(() => {});
            } catch(e) {}
        }

        function playGameOverMusic() {
            try {
                if (isMusicPlaying) return;
                audioElement.currentTime = 0;
                audioElement.volume = 1.0;
                const playPromise = audioElement.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => { isMusicPlaying = true; }).catch(() => {});
                }
            } catch(e) {}
        }

        function playWinMusic() {
            try {
                if (isMusicPlaying) return;
                winAudio.currentTime = 0;
                winAudio.volume = 1.0;
                const playPromise = winAudio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => { isMusicPlaying = true; }).catch(() => {});
                }
            } catch(e) {}
        }

        function stopGameOverMusic() {
            try {
                if (!audioElement.paused) {
                    audioElement.pause();
                    audioElement.currentTime = 0;
                }
                if (!winAudio.paused) {
                    winAudio.pause();
                    winAudio.currentTime = 0;
                }
                isMusicPlaying = false;
            } catch(e) {}
        }

        function shakeScreen() {
            document.body.classList.remove('shaking');
            void document.body.offsetWidth;
            document.body.classList.add('shaking');
            setTimeout(() => { document.body.classList.remove('shaking'); }, 500);
        }

        // ============================================================
        // UI
        // ============================================================
        function updateHeartsUI() {
            heartElements.forEach((el, index) => {
                if (hearts[index]) {
                    el.classList.remove('lost', 'breaking');
                    el.textContent = '🤣';
                } else {
                    el.classList.add('lost');
                    el.textContent = '💔';
                }
            });
        }

        // ============================================================
        // LOGO - CAMBIO DE TEXTO CON ANIMACIÓN RÁPIDA Y FUERTE
        // ============================================================
        function toggleLogo() {
            if (isGameOver) return;

            // Quitar animación previa
            logoContainer.classList.remove('shaking-logo');
            void logoContainer.offsetWidth;

            if (logoState === 0) {
                // Cambiar a "Ríe"
                logoText.textContent = 'Ríe';
                logoText.classList.add('switched');
                logoSub.textContent = '★ laugh & enjoy ★';
                logoSub.classList.add('switched');
                logoState = 1;
                // Iniciar loop de LogoPress
                playLogoPress();
            } else {
                // Volver a "NoTeRias"
                logoText.textContent = 'NoTeRias';
                logoText.classList.remove('switched');
                logoSub.textContent = '★ play & enjoy ★';
                logoSub.classList.remove('switched');
                logoState = 0;
                // Detener loop de LogoPress
                stopLogoPress();
                // Reproducir Shh
                playShh();
            }

            // Aplicar animación de temblor rápido y fuerte
            logoContainer.classList.add('shaking-logo');
            setTimeout(() => {
                logoContainer.classList.remove('shaking-logo');
            }, 1200);
        }

        // ============================================================
        // JUEGO
        // ============================================================
        function checkLoseCondition() {
            const allLost = hearts.every(h => h === false);
            const allWin = hearts.every(h => h === true);
            
            if (allWin && !isGameOver && hearts.length === 3) {
                // GANASTE XDD - todos los corazones están en 🤣
                isGameOver = true;
                isWin = true;
                resetBtn.classList.add('visible');
                
                // Animación de celebración
                shakeScreen();
                // Detener LogoPress si está sonando
                stopLogoPress();
                setTimeout(() => { playWinMusic(); }, 300);
                setTimeout(() => {
                    showGameOverOverlay('GANASTE XDD', '🤣TE REÍSTE DEMASIA- AY- AJAJAJAJAJ XDDDD');
                }, 600);
                return;
            }
            
            if (allLost && !isGameOver) {
                isGameOver = true;
                isWin = false;
                resetBtn.classList.add('visible');
                heartElements.forEach(el => {
                    if (el.classList.contains('lost')) {
                        el.classList.remove('lost');
                        el.classList.add('breaking');
                        el.textContent = '🤣';
                    }
                });
                shakeScreen();
                // Detener LogoPress si está sonando
                stopLogoPress();
                setTimeout(() => { playGameOverMusic(); }, 300);
                setTimeout(() => {
                    showGameOverOverlay('GAME OVER', '💀 Has perdido todos tus corazones');
                }, 600);
            }
        }

        function showGameOverOverlay(title, sub) {
            goText.textContent = title;
            goSubText.textContent = sub;
            gameOverOverlay.classList.add('show');
            document.body.classList.add('game-over-active');
            youtubeSearch.classList.add('hidden');
            youtubeResults.classList.remove('active');
            youtubeResults.classList.add('hidden');
            videoContainer.innerHTML = '';
            videoInfo.style.display = 'none';
            mainContainer.classList.add('game-over-mode');
        }

        function hideGameOverOverlay() {
            gameOverOverlay.classList.remove('show');
            document.body.classList.remove('game-over-active');
            mainContainer.classList.remove('game-over-mode');
            youtubeSearch.classList.remove('hidden');
            youtubeResults.classList.remove('hidden');
            stopGameOverMusic();
            isMusicPlaying = false;
        }

        function resetHearts() {
            stopGameOverMusic();
            isMusicPlaying = false;
            isGameOver = false;
            isWin = false;
            hearts = [true, true, true];
            updateHeartsUI();
            resetBtn.classList.remove('visible');
            document.body.classList.remove('shaking');
            hideGameOverOverlay();
            youtubeSearch.classList.remove('hidden');
            youtubeResults.classList.remove('hidden');
            mainContainer.classList.remove('game-over-mode');
            // Si LogoPress estaba sonando, detenerlo
            stopLogoPress();
            // Si el logo estaba en "Ríe", volver a "NoTeRias"
            if (logoState === 1) {
                logoText.textContent = 'NoTeRias';
                logoText.classList.remove('switched');
                logoSub.textContent = '★ play & enjoy ★';
                logoSub.classList.remove('switched');
                logoState = 0;
            }
            // Restaurar texto del overlay
            goText.textContent = 'GAME OVER';
            goSubText.textContent = '❤️ Haz perdido todos tus corazones';
        }

        // ============================================================
        // CLICK EN CORAZÓN
        // ============================================================
        function handleHeartClick(e) {
            if (isGameOver) return;
            const heartEl = e.currentTarget;
            const index = parseInt(heartEl.dataset.index, 10);
            if (!hearts[index]) return;

            hearts[index] = false;
            updateHeartsUI();
            shakeScreen();

            // under.mp3 siempre al perder cualquier corazón
            playUnder();

            const remaining = hearts.filter(h => h === true).length;
            
            // Si queda 1 vida: sonido aleatorio
            if (remaining === 1) {
                playRandomExclamation();
            }
            
            // Verificar si todos los corazones están perdidos o todos están en 🤣
            // Pero como ahora los corazones vivos son 🤣, la condición de victoria es que todos sean 🤣
            // y la condición de derrota es que todos sean 💔
            checkLoseCondition();
        }

        // ============================================================
        // LOGO - EVENTO CLICK
        // ============================================================
        logoContainer.addEventListener('click', toggleLogo);

        // ============================================================
        // YOUTUBE - CON INFORMACIÓN DEL VIDEO
        // ============================================================
        function loadYouTubeVideo() {
            let url = searchInput.value.trim();
            if (!url) {
                videoContainer.innerHTML = `<div style="color:#ff6b7c;text-align:center;padding:2rem;font-size:1.1rem;font-family:'Segoe UI',Arial,sans-serif;">⚠️ Por favor, ingresa una URL de YouTube</div>`;
                videoInfo.style.display = 'none';
                youtubeResults.classList.add('active');
                youtubeResults.classList.remove('hidden');
                return;
            }
            
            let videoId = null;
            let match = url.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^&?]+)/);
            if (match) videoId = match[1];
            match = url.match(/youtube\.com\/embed\/([^&?]+)/);
            if (match) videoId = match[1];
            
            if (!videoId) {
                videoContainer.innerHTML = `<div style="color:#ff6b7c;text-align:center;padding:2rem;font-size:1.1rem;font-family:'Segoe UI',Arial,sans-serif;">⚠️ URL no válida. Usa formato: https://youtu.be/ID o https://youtube.com/watch?v=ID</div>`;
                videoInfo.style.display = 'none';
                youtubeResults.classList.add('active');
                youtubeResults.classList.remove('hidden');
                return;
            }
            
            const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=0&rel=0`;
            
            // Obtener información del video usando la API de oEmbed
            const oembedUrl = `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`;
            
            fetch(oembedUrl)
                .then(response => response.json())
                .then(data => {
                    videoContainer.innerHTML = `
                        <iframe src="${embedUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    `;
                    videoTitle.textContent = data.title || 'Título no disponible';
                    creatorName.textContent = data.author_name || 'Creador desconocido';
                    videoInfo.style.display = 'block';
                    youtubeResults.classList.add('active');
                    youtubeResults.classList.remove('hidden');
                })
                .catch(() => {
                    // Fallback: mostrar solo el video sin información
                    videoContainer.innerHTML = `
                        <iframe src="${embedUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    `;
                    videoTitle.textContent = 'Video de YouTube';
                    creatorName.textContent = 'Creador';
                    videoInfo.style.display = 'block';
                    youtubeResults.classList.add('active');
                    youtubeResults.classList.remove('hidden');
                });
        }

        function closeResults() {
            youtubeResults.classList.remove('active');
            videoContainer.innerHTML = '';
            videoInfo.style.display = 'none';
        }

        // ============================================================
        // INICIALIZAR
        // ============================================================
        function init() {
            resetHearts();

            heartElements.forEach(el => {
                el.removeEventListener('click', handleHeartClick);
                el.addEventListener('click', handleHeartClick);
            });

            resetBtn.addEventListener('click', resetHearts);
            goResetBtn.addEventListener('click', resetHearts);

            searchBtn.addEventListener('click', loadYouTubeVideo);
            searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loadYouTubeVideo(); });
            closeResultsBtn.addEventListener('click', closeResults);

            console.log('❤️ NoTeRias · Corazones con risa y victoria XDD');
            console.log('📁 Archivos necesarios: GameOver.mp3, Win.mp3, under.mp3, AyNo.mp3, Ay.mp3, Noo.mp3, WTHB.mp3, LogoPress.mp3, Shh.mp3, Log0.png');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        window.resetHearts = resetHearts;
    })();
</script>
</body>
</html>
