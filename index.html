<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoTeRias · VHS 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
        }
        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff6b7c66;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #controls-hint {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff6b7c44;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #ff6b7c22;
        }
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b7c44;
            font-size: 2rem;
            z-index: 10;
            pointer-events: none;
            opacity: 0.5;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        #inventory {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: none;
            background: rgba(0,0,0,0.7);
            border: 2px solid #ff6b7c44;
            border-radius: 16px;
            padding: 10px 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(255,43,79,0.1);
        }
        #inventory.visible {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #inventory .item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ff6b7c88;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        #inventory .item img {
            width: 40px;
            height: 30px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(255,43,79,0.2));
        }
        #inventory .item .key-hint {
            color: #ff6b7c44;
            font-size: 0.6rem;
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #ff6b7c22;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #ff6b7c66;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            flex-direction: column;
            gap: 20px;
        }
        #loading .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #ff6b7c22;
            border-top: 3px solid #ff6b7c88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #exit-tutorial {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            background: rgba(255,43,79,0.15);
            border: 2px solid #ff6b7c44;
            color: #ff6b7c88;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: none;
        }
        #exit-tutorial:hover {
            background: rgba(255,43,79,0.25);
            border-color: #ff6b7c88;
            color: #ff6b7c;
        }
        #exit-tutorial.visible {
            display: block;
        }

        .floating-message {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            color: #ff6b7c;
            font-size: 1.8rem;
            font-family: 'Komika Axis', 'Comic Sans MS', cursive;
            text-shadow: 0 0 40px rgba(255,43,79,0.5);
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 16px 32px;
            border-radius: 16px;
            border: 2px solid #ff6b7c44;
            backdrop-filter: blur(10px);
            text-align: center;
            letter-spacing: 2px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="loader"></div>
    <span>Cargando VHS...</span>
</div>

<div id="canvas-container"></div>

<div id="crosshair">+</div>

<div id="inventory">
    <div class="item">
        <img src="VHS.png" alt="VHS">
        <span>Cinta VHS</span>
        <span class="key-hint">[Click TV para usar]</span>
    </div>
</div>

<div id="controls-hint">W A S D · Mover · Click en cinta para recoger</div>
<div id="info">✦ VHS 3D ✦</div>

<button id="exit-tutorial">✕ Salir</button>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    (function() {
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 10, 30);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.7, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // ============================================================
        // LUCES
        // ============================================================
        const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xff6b7c, 1.5, 15);
        pointLight.position.set(0, 4, 2);
        scene.add(pointLight);

        const pointLight2 = new THREE.PointLight(0x4466ff, 0.5, 10);
        pointLight2.position.set(-3, 2, -1);
        scene.add(pointLight2);

        const pointLight3 = new THREE.PointLight(0x4422aa, 0.3, 8);
        pointLight3.position.set(3, 1, -2);
        scene.add(pointLight3);

        const tvLight = new THREE.PointLight(0x8888ff, 0.5, 8);
        tvLight.position.set(0, 1.5, 0);
        scene.add(tvLight);

        // ============================================================
        // SUELO
        // ============================================================
        const floorGeometry = new THREE.PlaneGeometry(20, 20);
        const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0x0a0a0a,
            roughness: 0.9,
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.5;
        floor.receiveShadow = true;
        scene.add(floor);

        // ============================================================
        // PAREDES
        // ============================================================
        function createWall(width, height, posX, posY, posZ, rotY = 0) {
            const geo = new THREE.PlaneGeometry(width, height);
            const mat = new THREE.MeshStandardMaterial({
                color: 0x0a0a12,
                roughness: 0.8,
                metalness: 0.2,
                side: THREE.DoubleSide
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(posX, posY, posZ);
            mesh.rotation.y = rotY;
            mesh.receiveShadow = true;
            scene.add(mesh);
            return mesh;
        }

        createWall(12, 4, 0, 1.5, -6, 0);
        createWall(12, 4, 0, 1.5, 6, Math.PI);
        createWall(12, 4, -6, 1.5, 0, Math.PI / 2);
        createWall(12, 4, 6, 1.5, 0, -Math.PI / 2);

        // ============================================================
        // TELEVISIÓN VHS
        // ============================================================
        const tvGroup = new THREE.Group();
        tvGroup.position.set(0, 1.2, -2.5);

        const tvBodyGeo = new THREE.BoxGeometry(2.2, 1.8, 0.6);
        const tvBodyMat = new THREE.MeshStandardMaterial({
            color: 0x1a1a2a,
            roughness: 0.6,
            metalness: 0.4,
            emissive: 0x0a0a1a,
            emissiveIntensity: 0.1
        });
        const tvBody = new THREE.Mesh(tvBodyGeo, tvBodyMat);
        tvBody.position.z = 0;
        tvBody.castShadow = true;
        tvGroup.add(tvBody);

        // Pantalla
        const screenGeo = new THREE.PlaneGeometry(1.8, 1.35);
        const screenMat = new THREE.MeshStandardMaterial({
            color: 0x0a0a1a,
            emissive: 0x111133,
            emissiveIntensity: 0.2,
            roughness: 0.3,
            metalness: 0.1
        });
        const screen = new THREE.Mesh(screenGeo, screenMat);
        screen.position.set(0, 0.05, 0.31);
        tvGroup.add(screen);

        // Marco
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x222244, roughness: 0.5, metalness: 0.3 });
        const frameGeo = new THREE.BoxGeometry(1.85, 0.04, 0.05);
        const frameTop = new THREE.Mesh(frameGeo, frameMat);
        frameTop.position.set(0, 0.68, 0.31);
        tvGroup.add(frameTop);
        const frameBottom = new THREE.Mesh(frameGeo, frameMat);
        frameBottom.position.set(0, -0.68, 0.31);
        tvGroup.add(frameBottom);
        const frameLeft = new THREE.Mesh(new THREE.BoxGeometry(0.04, 1.35, 0.05), frameMat);
        frameLeft.position.set(-0.91, 0.05, 0.31);
        tvGroup.add(frameLeft);
        const frameRight = new THREE.Mesh(new THREE.BoxGeometry(0.04, 1.35, 0.05), frameMat);
        frameRight.position.set(0.91, 0.05, 0.31);
        tvGroup.add(frameRight);

        // Botón de encendido
        const powerBtnGeo = new THREE.SphereGeometry(0.05, 8, 8);
        const powerBtnMat = new THREE.MeshStandardMaterial({
            color: 0x44ff44,
            emissive: 0x44ff44,
            emissiveIntensity: 0.5
        });
        const powerBtn = new THREE.Mesh(powerBtnGeo, powerBtnMat);
        powerBtn.position.set(0.5, -0.5, 0.35);
        tvGroup.add(powerBtn);

        // Base
        const baseGeo = new THREE.BoxGeometry(1.2, 0.1, 0.4);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.8 });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.set(0, -0.95, 0);
        tvGroup.add(base);

        // Patas
        const legMat = new THREE.MeshStandardMaterial({ color: 0x222244, metalness: 0.5, roughness: 0.3 });
        const legPositions = [[-0.4, -1.0, 0.2], [0.4, -1.0, 0.2], [-0.4, -1.0, -0.2], [0.4, -1.0, -0.2]];
        legPositions.forEach(pos => {
            const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.05, 0.1, 6), legMat);
            leg.position.set(pos[0], pos[1], pos[2]);
            tvGroup.add(leg);
        });

        scene.add(tvGroup);

        const tvScreen = screen;

        // ============================================================
        // REPRODUCTOR DE VIDEO DE LA TV
        // ============================================================
        let videoElement = null;
        let videoTexture = null;
        let isPlaying = false;
        let isNoInPlaying = false;
        let isWatching = false;
        let hasVHS = false;
        let currentVideo = 'screen';

        function createVideoElement(src, loop = true, onEnd = null) {
            const video = document.createElement('video');
            video.src = src;
            video.crossOrigin = 'anonymous';
            video.playsInline = true;
            video.muted = false;
            video.loop = loop;
            video.volume = 0.5;
            return video;
        }

        function setTVScreen(video, isLoop = true) {
            if (videoTexture) {
                videoTexture.dispose();
            }
            videoTexture = new THREE.VideoTexture(video);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;

            tvScreen.material = new THREE.MeshStandardMaterial({
                map: videoTexture,
                emissive: new THREE.Color(0x4488ff),
                emissiveIntensity: 0.3,
                roughness: 0.2,
                metalness: 0.1,
                side: THREE.DoubleSide
            });

            tvLight.intensity = 1.5;
            isPlaying = true;
        }

        function playScreenLoop() {
            if (videoElement) {
                videoElement.pause();
                videoElement.currentTime = 0;
                videoElement = null;
            }

            currentVideo = 'screen';
            videoElement = createVideoElement('Screen.mp4', true);
            setTVScreen(videoElement, true);
            videoElement.play().catch(err => {
                console.log('Error reproduciendo Screen.mp4:', err);
            });
        }

        function playNoIn() {
            if (videoElement) {
                videoElement.pause();
                videoElement.currentTime = 0;
                videoElement = null;
            }

            currentVideo = 'noin';
            isNoInPlaying = true;
            videoElement = createVideoElement('NoIn.mp4', false);
            setTVScreen(videoElement, false);

            videoElement.addEventListener('ended', function onEnd() {
                videoElement.removeEventListener('ended', onEnd);
                isNoInPlaying = false;
                playScreenLoop();
            });

            videoElement.play().catch(err => {
                console.log('Error reproduciendo NoIn.mp4:', err);
                isNoInPlaying = false;
                playScreenLoop();
            });
        }

        function playTutorial() {
            if (videoElement) {
                videoElement.pause();
                videoElement.currentTime = 0;
                videoElement = null;
            }

            currentVideo = 'tutorial';
            videoElement = createVideoElement('Tutoriall.mp4', false);
            setTVScreen(videoElement, false);

            videoElement.addEventListener('ended', function onEnd() {
                videoElement.removeEventListener('ended', onEnd);
                playScreenLoop();
            });

            videoElement.play().catch(err => {
                console.log('Error reproduciendo Tutoriall.mp4:', err);
                playScreenLoop();
            });
        }

        // Iniciar con Screen.mp4 en loop
        setTimeout(() => {
            playScreenLoop();
        }, 500);

        // ============================================================
        // CINTA VHS
        // ============================================================
        const vhsGroup = new THREE.Group();
        vhsGroup.position.set(1.5, 0.1, -1.5);

        const tapeMat = new THREE.MeshStandardMaterial({
            color: 0x1a1a2a,
            roughness: 0.7,
            metalness: 0.2
        });
        const tapeBody = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.25, 0.6), tapeMat);
        tapeBody.castShadow = true;
        vhsGroup.add(tapeBody);

        const labelMat = new THREE.MeshStandardMaterial({
            color: 0x222244,
            roughness: 0.5,
            emissive: 0x111133,
            emissiveIntensity: 0.1
        });
        const label = new THREE.Mesh(new THREE.PlaneGeometry(0.25, 0.1), labelMat);
        label.position.set(0, 0.13, 0.31);
        vhsGroup.add(label);

        const windowMat = new THREE.MeshStandardMaterial({
            color: 0x0a0a1a,
            roughness: 0.1,
            metalness: 0.3,
            emissive: 0x222244,
            emissiveIntensity: 0.1
        });
        const windowMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 0.08), windowMat);
        windowMesh.position.set(0, 0.0, 0.31);
        vhsGroup.add(windowMesh);

        const coilMat = new THREE.MeshStandardMaterial({
            color: 0x333355,
            roughness: 0.3,
            metalness: 0.5
        });
        const coilPos = [[-0.08, 0, 0.3], [0.08, 0, 0.3]];
        coilPos.forEach(pos => {
            const coil = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.02, 8), coilMat);
            coil.rotation.x = Math.PI / 2;
            coil.position.set(pos[0], pos[1], pos[2]);
            vhsGroup.add(coil);
        });

        scene.add(vhsGroup);

        // ============================================================
        // ESTADO DEL JUGADOR
        // ============================================================
        let playerPos = new THREE.Vector3(0, 1.7, 5);
        let playerRot = 0;
        let pitch = 0; // Ángulo de inclinación vertical
        let velocity = new THREE.Vector3(0, 0, 0);
        const speed = 0.06;
        const rotSpeed = 0.035;
        let isLocked = false;
        let mouseX = 0;
        let mouseY = 0;

        // ============================================================
        // CONTROLES DE TECLADO
        // ============================================================
        const keys = { w: false, a: false, s: false, d: false };

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                keys[key] = true;
                e.preventDefault();
            }
            if (e.key === 'Escape' && isWatching) {
                exitTutorialView();
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'a' || key === 's' || key === 'd') {
                keys[key] = false;
                e.preventDefault();
            }
        });

        // ============================================================
        // MOUSE LOCK
        // ============================================================
        document.addEventListener('click', () => {
            if (!isLocked && !isWatching) {
                renderer.domElement.requestPointerLock();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === renderer.domElement;
        });

        // MOVIMIENTO DEL MOUSE - CORREGIDO PARA QUE ARRIBA MIRA ARRIBA
        document.addEventListener('mousemove', (e) => {
            if (isLocked && !isWatching) {
                // Horizontal: izquierda/derecha
                mouseX += e.movementX * 0.002;
                // Vertical: arriba/abajo (movimiento del mouse hacia arriba = pitch negativo para mirar arriba)
                mouseY -= e.movementY * 0.002;
                // Limitar la inclinación vertical para no dar la vuelta
                mouseY = Math.max(-1.0, Math.min(1.0, mouseY));
            }
        });

        // ============================================================
        // RAYCASTER PARA INTERACCIÓN
        // ============================================================
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        renderer.domElement.addEventListener('click', (e) => {
            if (isWatching) return;

            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);

            // Click en cinta VHS
            const vhsIntersects = raycaster.intersectObject(vhsGroup, true);
            if (vhsIntersects.length > 0 && !hasVHS) {
                hasVHS = true;
                scene.remove(vhsGroup);
                document.getElementById('inventory').classList.add('visible');
                showMessage('📼 Cinta VHS recogida');
                return;
            }

            // Click en TV
            const tvIntersects = raycaster.intersectObject(tvGroup, true);
            if (tvIntersects.length > 0) {
                if (hasVHS) {
                    showMessage('📺 Reproduciendo Tutorial...');
                    playTutorial();
                    isWatching = true;
                    document.getElementById('exit-tutorial').classList.add('visible');
                    document.getElementById('inventory').classList.remove('visible');
                } else {
                    showMessage('📺 No hay cinta insertada');
                    playNoIn();
                }
                return;
            }
        });

        // ============================================================
        // MENSAJES FLOTANTES
        // ============================================================
        let messageTimeout = null;

        function showMessage(text) {
            const existing = document.querySelector('.floating-message');
            if (existing) existing.remove();
            if (messageTimeout) clearTimeout(messageTimeout);

            const div = document.createElement('div');
            div.className = 'floating-message';
            div.textContent = text;
            document.body.appendChild(div);

            messageTimeout = setTimeout(() => {
                if (div.parentNode) div.remove();
            }, 2500);
        }

        // ============================================================
        // SALIR DE LA VISTA DEL TUTORIAL
        // ============================================================
        function exitTutorialView() {
            if (!isWatching) return;
            isWatching = false;
            document.getElementById('exit-tutorial').classList.remove('visible');

            if (videoElement) {
                videoElement.pause();
                videoElement.currentTime = 0;
                videoElement = null;
            }
            playScreenLoop();

            if (hasVHS) {
                document.getElementById('inventory').classList.add('visible');
            }
        }

        document.getElementById('exit-tutorial').addEventListener('click', exitTutorialView);

        // ============================================================
        // BUCLE DE RENDERIZADO
        // ============================================================
        let startTime = Date.now();

        function animate() {
            requestAnimationFrame(animate);

            const now = Date.now();
            const delta = Math.min((now - startTime) / 16.67, 3);
            startTime = now;

            if (!isWatching) {
                // Rotación horizontal
                if (isLocked) {
                    playerRot += mouseX * 0.5;
                    mouseX = 0;
                    // La inclinación vertical se aplica directamente
                    pitch = mouseY * 0.8;
                }

                // Movimiento WASD
                const forward = new THREE.Vector3(-Math.sin(playerRot), 0, -Math.cos(playerRot));
                const right = new THREE.Vector3(Math.cos(playerRot), 0, -Math.sin(playerRot));

                const moveVec = new THREE.Vector3(0, 0, 0);
                if (keys.w) moveVec.add(forward);
                if (keys.s) moveVec.sub(forward);
                if (keys.a) moveVec.sub(right);
                if (keys.d) moveVec.add(right);

                if (moveVec.length() > 0) {
                    moveVec.normalize().multiplyScalar(speed * delta);
                    playerPos.add(moveVec);
                    playerPos.x = Math.max(-4.5, Math.min(4.5, playerPos.x));
                    playerPos.z = Math.max(-4.5, Math.min(4.5, playerPos.z));
                }

                // Posición de la cámara
                camera.position.copy(playerPos);
                camera.position.y = 1.7;

                // Rotación de la cámara (horizontal + vertical)
                const euler = new THREE.Euler(pitch, playerRot, 0, 'YXZ');
                camera.quaternion.setFromEuler(euler);
            } else {
                // Modo TV: cámara fija frente a la TV en 4:3
                camera.position.set(0, 1.5, -0.7);
                camera.lookAt(0, 0.8, -2.5);
            }

            // Animación de la cinta VHS en el suelo
            if (!hasVHS && vhsGroup.parent) {
                vhsGroup.rotation.y += 0.005;
                vhsGroup.position.y = 0.1 + Math.sin(now / 1000) * 0.02;
            }

            renderer.render(scene, camera);
        }

        // ============================================================
        // REDIMENSIONAR
        // ============================================================
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });

        // ============================================================
        // INICIO
        // ============================================================
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 800);

        renderer.domElement.addEventListener('click', () => {
            if (!isLocked && !isWatching) {
                renderer.domElement.requestPointerLock();
            }
        });

        animate();
